<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DiCO Ai</title>
    
    <!-- Meta tags PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DiCO Ai">
    <meta name="theme-color" content="#0ea5e9">
    
    <!-- Icône pour écran d'accueil -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/blue-book.png">
    
    <link rel="manifest" href='data:application/json,{"name":"DiCO Ai","short_name":"DiCO Ai","start_url":".","display":"standalone","background_color":"#f8fafc","theme_color":"#0ea5e9","icons":[{"src":"https://img.icons8.com/fluency/512/blue-book.png","sizes":"512x512","type":"image/png"}]}'>

    <!-- Librairies Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        * { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
        }
        
        body { 
            background-color: #f8fafc; 
            color: #0f172a; 
            margin: 0; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* --- STYLE TEXTE DROIT --- */
        .brand-text {
            font-style: normal !important;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        /* --- ANIMATIONS DU LOGO --- */
        @keyframes slideInFromRight {
            0% { transform: translateX(100vw); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes flipPageAction {
            0% { transform: rotateY(0deg); opacity: 1; }
            100% { transform: rotateY(-180deg); opacity: 0; }
        }

        .animate-slide {
            animation: slideInFromRight 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-page {
            transform-origin: left center;
            animation: flipPageAction 0.8s 1.2s ease-in-out forwards;
            backface-visibility: hidden;
        }

        .perspective {
            perspective: 1000px;
        }

        /* Splash Screen centré */
        .splash-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            padding: 2rem;
            background-color: #f8fafc;
        }

        /* Styles UI */
        .card-premium {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
        }
        
        .card-premium:active {
            transform: scale(0.98);
        }

        .loader-spin {
            border: 2px solid #e2e8f0;
            border-top: 2px solid #0ea5e9;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Barre de recherche flottante */
        .search-container {
            border-radius: 2rem;
            background: white;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Configuration (Variables d'environnement ou fallback)
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };
        
        const geminiApiKey = ""; // Clé Gemini
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dico-ai-alex';

        // Initialisation Firebase
        if (!firebase.apps.length && firebaseConfig.apiKey) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- COMPOSANT LOGO (Livre blanc dans cadre bleu) ---
        const DicoLogo = ({ size = 100, animated = true, inHeader = false }) => (
            <div className={`perspective ${animated ? 'animate-slide' : ''}`} style={{ width: size, height: size }}>
                <div className={`${inHeader ? 'bg-white/20 border border-white/30' : 'bg-sky-500 shadow-xl'} rounded-[24%] w-full h-full flex items-center justify-center relative overflow-hidden`}>
                    {/* Le Livre Blanc */}
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-1/2 h-1/2 relative z-10">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                    </svg>
                    
                    {/* Page qui tourne */}
                    {animated && (
                        <div className="absolute inset-0 flex items-center justify-center z-20 animate-page">
                            <div className="bg-white/80 w-1/2 h-3/5 ml-auto border-l border-sky-200" />
                        </div>
                    )}
                </div>
            </div>
        );

        // --- COMPOSANT ICONE ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) ref.current.innerHTML = icon.toSvg({ class: className });
                }
            }, [name, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [words, setWords] = useState([]);
            const [search, setSearch] = useState('');
            const [inputValue, setInputValue] = useState('');
            const [loading, setLoading] = useState(false);
            const [expandedId, setExpandedId] = useState(null);

            // Auth Logic
            useEffect(() => {
                const init = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        }
                    } catch (e) { console.error(e); }
                    finally { setIsAuthReady(true); }
                };
                init();
                return auth.onAuthStateChanged(setUser);
            }, []);

            // Data Logic
            useEffect(() => {
                if (user) {
                    const path = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary');
                    return path.onSnapshot(snap => {
                        setWords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                }
            }, [user]);

            const sortedWords = useMemo(() => {
                return words
                    .filter(w => w.term.toLowerCase().includes(search.toLowerCase()))
                    .sort((a, b) => a.term.localeCompare(b.term));
            }, [words, search]);

            const handleAdd = async () => {
                if (!inputValue.trim() || loading || !user) return;
                setLoading(true);
                try {
                    const prompt = `Analyse "${inputValue}". Réponds en JSON : {"category": "mot" | "proverbe" | "personnage", "term": "corrigé", "definition": "explication courte", "example": "usage", "details": "origine"}`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
                    
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary').add({
                        ...result,
                        createdAt: Date.now()
                    });
                    setInputValue('');
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            };

            const guestSignIn = () => {
                setLoading(true);
                auth.signInAnonymously().finally(() => setLoading(false));
            };

            if (!isAuthReady) return (
                <div className="h-screen w-full flex items-center justify-center bg-slate-50">
                    <div className="loader-spin" />
                </div>
            );

            // --- VUE SPLASH / CONNEXION ---
            if (!user) return (
                <div className="splash-view">
                    <DicoLogo size={120} animated={true} />
                    <div className="mt-10 space-y-4">
                        <h1 className="text-5xl brand-text text-sky-600 tracking-tighter">DiCO Ai</h1>
                        <p className="text-slate-400 text-sm max-w-[260px] mx-auto font-light leading-relaxed">
                            Votre intelligence artificielle lexicale personnelle.
                        </p>
                    </div>
                    <div className="mt-12 w-full max-w-xs space-y-4">
                        <button 
                            onClick={guestSignIn}
                            className="w-full bg-sky-500 text-white p-5 rounded-[2rem] shadow-xl shadow-sky-100 flex items-center justify-center gap-3 transition-all active:scale-95 font-medium"
                        >
                            {loading ? <div className="loader-spin border-white" /> : <><Icon name="play" /> Accès invité (Test rapide)</>}
                        </button>
                    </div>
                </div>
            );

            // --- VUE PRINCIPALE ---
            return (
                <div className="flex flex-col min-h-screen bg-slate-50">
                    <header className="p-6 pt-12 bg-sky-500 rounded-b-[3.5rem] sticky top-0 z-30 shadow-xl flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <DicoLogo size={42} animated={false} inHeader={true} />
                            <h1 className="text-2xl brand-text text-white tracking-tight">DiCO Ai</h1>
                        </div>
                        <button onClick={() => auth.signOut()} className="text-white/80 p-2 hover:text-white transition-colors">
                            <Icon name="log-out" />
                        </button>
                    </header>

                    <main className="p-5 flex-1 space-y-5 pb-44">
                        <div className="search-container flex items-center px-5 py-4 bg-white border border-slate-100">
                            <Icon name="search" className="text-slate-300 w-5 h-5 mr-3" />
                            <input 
                                type="text" 
                                placeholder="Rechercher..." 
                                className="w-full bg-transparent outline-none font-light italic"
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                        </div>

                        <div className="space-y-4">
                            {sortedWords.map(w => (
                                <div 
                                    key={w.id} 
                                    className={`p-7 card-premium ${expandedId === w.id ? 'ring-2 ring-sky-100' : ''}`}
                                    onClick={() => setExpandedId(expandedId === w.id ? null : w.id)}
                                >
                                    <div className="flex justify-between items-start mb-3">
                                        <span className={`text-[9px] uppercase tracking-widest px-3 py-1 rounded-full font-bold ${
                                            w.category === 'proverbe' ? 'bg-emerald-50 text-emerald-600' : 
                                            w.category === 'personnage' ? 'bg-purple-50 text-purple-600' : 
                                            'bg-sky-50 text-sky-600'
                                        }`}>{w.category}</span>
                                        <button onClick={(e) => { e.stopPropagation(); db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary').doc(w.id).delete(); }} className="text-slate-200 hover:text-rose-500 transition-colors">
                                            <Icon name="trash-2" className="w-4 h-4" />
                                        </button>
                                    </div>
                                    <h3 className="text-2xl brand-text text-slate-800 capitalize mb-2">{w.term}</h3>
                                    <p className="text-sm opacity-60 font-light leading-relaxed">{w.definition}</p>
                                    
                                    {expandedId === w.id && (
                                        <div className="mt-5 pt-5 border-t border-slate-50 space-y-4 animate-in fade-in duration-500">
                                            <div className="bg-slate-50 p-5 rounded-3xl">
                                                <p className="text-xs italic opacity-80 font-light leading-snug">"{w.example}"</p>
                                            </div>
                                            <p className="text-[10px] text-slate-300 uppercase tracking-widest font-medium">
                                                {w.category === 'personnage' ? 'Époque : ' : 'Origine : '} {w.details}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-slate-50 via-slate-50/80 to-transparent pointer-events-none">
                        <div className="max-w-md mx-auto bg-white rounded-[3rem] shadow-2xl p-2 flex items-center gap-2 border border-slate-100 pointer-events-auto">
                            <input 
                                type="text" 
                                placeholder="Ajouter un mot, proverbe..." 
                                className="flex-1 px-8 py-5 outline-none font-light italic bg-transparent"
                                value={inputValue}
                                onChange={e => setInputValue(e.target.value)}
                                onKeyPress={e => e.key === 'Enter' && handleAdd()}
                            />
                            <button 
                                onClick={handleAdd}
                                className="bg-sky-500 text-white p-5 rounded-[2.2rem] shadow-xl min-w-[75px] flex items-center justify-center transition-all active:scale-90"
                            >
                                {loading ? <div className="loader-spin border-white" /> : <Icon name="plus" className="w-6 h-6" />}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

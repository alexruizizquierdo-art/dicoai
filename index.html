<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DiCO Ai</title>
    
    <!-- Meta tags pour l'installation smartphone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DiCO Ai">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/blue-book.png">

    <!-- Librairies Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        /* FORCE LE STYLE DROIT (AUCUN ITALIQUE) */
        * { 
            font-family: 'Inter', sans-serif !important; 
            font-style: normal !important; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-color: #f8fafc; 
            color: #0f172a; 
            margin: 0; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* --- ANIMATIONS DU LOGO DYNAMIQUE --- */
        @keyframes slideInFromRight {
            0% { transform: translateX(150vw); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes turnPageEffect {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(-180deg); opacity: 0; }
        }

        .logo-entry-anim {
            animation: slideInFromRight 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .flipping-page-anim {
            transform-origin: center left;
            animation: turnPageEffect 1s 1.5s ease-in-out forwards;
            backface-visibility: hidden;
            z-index: 30;
        }

        .perspective-container {
            perspective: 1500px;
        }

        /* Le Cadre Bleu Ciel */
        .blue-box-frame {
            background-color: #0ea5e9;
            border-radius: 24%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 30px -5px rgba(14, 165, 233, 0.3);
            position: relative;
            overflow: hidden;
        }

        .header-box-frame {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* UI Premium */
        .premium-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 4px 10px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(226, 232, 240, 0.7);
            transition: all 0.3s ease;
        }
        .premium-card:active { transform: scale(0.98); }

        .loader-spin {
            border: 2px solid #e2e8f0;
            border-top: 2px solid #0ea5e9;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Configuration dynamique
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { apiKey: "demo", projectId: "demo" };
        
        const apiKey = ""; // Ta clé Gemini
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dico-ai-alex';

        if (!firebase.apps.length && firebaseConfig.apiKey !== "demo") {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- COMPOSANT LOGO DYNAMIQUE (DICTIONNAIRE OUVERT) ---
        const DicoLogo = ({ size = 100, animated = true, headerMode = false }) => (
            <div className={`perspective-container ${animated ? 'logo-entry-anim' : ''}`} style={{ width: size, height: size }}>
                <div className={headerMode ? "header-box-frame w-full h-full" : "blue-box-frame w-full h-full"}>
                    {/* SVG Dictionnaire Ouvert dessiné manuellement */}
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className="w-[60%] h-[60%] relative z-10">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" fill="white" fillOpacity="0.05" />
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" fill="white" fillOpacity="0.05" />
                        <path d="M12 7v14" strokeWidth="1" opacity="0.3" />
                    </svg>
                    
                    {/* Page qui tourne au centre */}
                    {animated && (
                        <div className="absolute inset-0 flex items-center justify-center flipping-page-anim">
                            <div className="bg-white/95 w-[30%] h-1/2 ml-[30%] border-l border-sky-300 shadow-sm rounded-r-sm" />
                        </div>
                    )}
                </div>
            </div>
        );

        // --- COMPOSANT ICONE ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) ref.current.innerHTML = icon.toSvg({ class: className });
                }
            }, [name, className]);
            return <span ref={ref} className="inline-flex items-center" />;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [words, setWords] = useState([]);
            const [search, setSearch] = useState('');
            const [inputValue, setInputValue] = useState('');
            const [loading, setLoading] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [expandedId, setExpandedId] = useState(null);

            // Rule 3: Auth First
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else if (!auth.currentUser) {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error(e); }
                    finally { setIsAuthReady(true); }
                };
                initAuth();
                return auth.onAuthStateChanged(setUser);
            }, []);

            // Rule 1: Data Sync
            useEffect(() => {
                if (user && firebaseConfig.apiKey !== "demo") {
                    const path = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary');
                    return path.onSnapshot(snap => {
                        setWords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                }
            }, [user]);

            const sorted = useMemo(() => {
                return words
                    .filter(w => w.term.toLowerCase().includes(search.toLowerCase()))
                    .sort((a, b) => a.term.localeCompare(b.term));
            }, [words, search]);

            const handleAdd = async () => {
                if (!inputValue.trim() || loading || !user) return;
                setLoading(true);
                try {
                    const prompt = `Analyse "${inputValue}". Réponds UNIQUEMENT en JSON : {"category": "mot" | "proverbe" | "personnage", "term": "corrigé", "definition": "explication précise", "example": "usage", "details": "origine"}`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
                    
                    const path = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary');
                    await path.add({ ...result, createdAt: Date.now() });
                    setInputValue('');
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            };

            const speak = (text) => {
                if (isSpeaking) return;
                setIsSpeaking(true);
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = 'fr-FR';
                ut.onend = () => setIsSpeaking(false);
                window.speechSynthesis.speak(ut);
            };

            if (!isAuthReady) return <div className="h-screen flex items-center justify-center bg-slate-50"><div className="loader-spin" /></div>;

            // --- VUE DÉMARRAGE ---
            if (!user) return (
                <div className="flex flex-col items-center justify-center h-screen bg-slate-50 p-8 text-center overflow-hidden">
                    <DicoLogo size={160} animated={true} />
                    <div className="mt-14 space-y-4">
                        <h1 className="text-6xl font-medium text-sky-600 tracking-tighter">DiCO Ai</h1>
                        <p className="text-slate-400 text-sm max-w-[280px] mx-auto leading-relaxed">
                            L'IA au service de votre lexique, de vos personnages et de vos proverbes.
                        </p>
                    </div>
                    <div className="mt-16 w-full max-w-xs">
                        <button onClick={() => auth.signInAnonymously()} className="w-full bg-sky-500 text-white p-6 rounded-[2.5rem] shadow-xl shadow-sky-100 flex items-center justify-center gap-4 active:scale-95 font-semibold text-lg">
                            {loading ? <div className="loader-spin border-white" /> : <><Icon name="play" /> Accès invité</>}
                        </button>
                    </div>
                </div>
            );

            // --- VUE APPLICATION ---
            return (
                <div className="flex flex-col min-h-screen bg-slate-50">
                    <header className="p-6 pt-14 bg-sky-500 rounded-b-[4rem] sticky top-0 z-30 shadow-xl flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <DicoLogo size={54} animated={false} headerMode={true} />
                            <h1 className="text-2xl font-medium text-white tracking-tight">DiCO Ai</h1>
                        </div>
                        <button onClick={() => auth.signOut()} className="text-white/70 p-2 hover:text-white transition-all bg-white/10 rounded-full">
                            <Icon name="log-out" />
                        </button>
                    </header>

                    <main className="p-6 flex-1 space-y-6 pb-48">
                        <div className="bg-white rounded-3xl flex items-center px-6 py-5 border border-slate-100 shadow-sm">
                            <Icon name="search" className="text-slate-300 w-5 h-5 mr-4" />
                            <input type="text" placeholder="Rechercher..." className="w-full bg-transparent outline-none italic text-lg" value={search} onChange={e => setSearch(e.target.value)} />
                        </div>

                        <div className="space-y-5">
                            {sorted.map(w => (
                                <div key={w.id} className={`p-8 premium-card ${expandedId === w.id ? 'ring-2 ring-sky-100' : ''}`} onClick={() => setExpandedId(expandedId === w.id ? null : w.id)}>
                                    <div className="flex justify-between items-start mb-4">
                                        <span className={`text-[10px] uppercase tracking-[0.2em] px-4 py-1.5 rounded-full font-bold shadow-sm ${
                                            w.category === 'proverbe' ? 'bg-emerald-50 text-emerald-600' : 
                                            w.category === 'personnage' ? 'bg-purple-50 text-purple-600' : 
                                            'bg-sky-50 text-sky-600'
                                        }`}>{w.category}</span>
                                        <div className="flex gap-2">
                                            <button onClick={(e) => { e.stopPropagation(); speak(`${w.term}. ${w.definition}`); }} className={`${isSpeaking ? 'text-amber-500 animate-pulse' : 'text-sky-200'} hover:text-sky-500`}><Icon name="volume-2" /></button>
                                            <button onClick={(e) => { e.stopPropagation(); db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary').doc(w.id).delete(); }} className="text-slate-200 hover:text-rose-500"><Icon name="trash-2" className="w-5 h-5" /></button>
                                        </div>
                                    </div>
                                    <h3 className="text-2xl font-medium text-slate-800 capitalize mb-2">{w.term}</h3>
                                    <p className="text-lg opacity-60 leading-relaxed">{w.definition}</p>
                                    
                                    {expandedId === w.id && (
                                        <div className="mt-6 pt-6 border-t border-slate-50 space-y-5 animate-in fade-in duration-500">
                                            <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                                                <p className="text-sm italic opacity-80 leading-relaxed">"{w.example}"</p>
                                            </div>
                                            <p className="text-[11px] text-slate-300 uppercase tracking-[0.15em] font-semibold">
                                                {w.category === 'personnage' ? 'Époque : ' : 'Origine : '} {w.details}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-slate-50 via-slate-50/90 to-transparent pointer-events-none">
                        <div className="max-w-md mx-auto bg-white rounded-[3.5rem] shadow-2xl p-2 flex items-center gap-2 border border-slate-100 pointer-events-auto">
                            <input type="text" placeholder="Ajouter mot, nom..." className="flex-1 px-8 py-5 outline-none italic bg-transparent text-lg" value={inputValue} onChange={e => setInputValue(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleAdd()} />
                            <button onClick={handleAdd} className="bg-sky-500 text-white p-5 rounded-[2.5rem] shadow-xl min-w-[80px] flex items-center justify-center active:scale-90 shadow-sky-200">
                                {loading ? <div className="loader-spin border-white" /> : <Icon name="plus" className="w-8 h-8" />}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

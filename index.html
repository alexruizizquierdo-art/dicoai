<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DiCo Ai Pro ✨</title>
    
    <!-- CONFIGURATION "VRAIE APPLI" (PWA & IOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DiCo Ai Pro">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    
    <!-- Icônes de l'application -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/blue-book.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/512/blue-book.png">
    
    <!-- Manifeste embarqué pour l'installation -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22DiCo%20Ai%20Pro%22,%22short_name%22:%22DiCo%20Ai%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%230ea5e9%22,%22icons%22:[{%22src%22:%22https://img.icons8.com/fluency/512/blue-book.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <!-- Bibliothèques Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap');
        
        * { font-family: 'Inter', sans-serif !important; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; overflow-x: hidden; }
        #root { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* --- MOTEUR 3D ÉLITE (CADENASSÉ ROYAL) --- */
        @keyframes butterflyOpenAction { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(-180deg); } }
        @keyframes butterflyPageAction { 0% { transform: rotateY(0deg); opacity: 0; } 3% { opacity: 1; } 100% { transform: rotateY(-170deg); opacity: 1; } }
        @keyframes signatureRevealAction { 0%, 65% { opacity: 0; transform: translateY(4px); } 100% { opacity: 1; transform: translateY(0); } }

        .book-viewport { position: relative; transform-style: preserve-3d; perspective: 2500px; display: flex; align-items: center; justify-content: center; }
        .alex-frame-box { background-color: #0ea5e9; border-radius: 24%; display: flex; align-items: center; justify-content: center; box-shadow: 0 30px 60px -12px rgba(14, 165, 233, 0.45); position: relative; transform-style: preserve-3d; transition: all 0.4s ease; }
        
        /* FEEDBACK VOCAL - ROUGE CERISE ÉLITE */
        .is-listening-logo { 
            animation: listeningPulse 1.2s infinite !important; 
            background-color: #f43f5e !important; 
            box-shadow: 0 0 50px 8px rgba(244, 63, 94, 0.6) !important;
        }
        
        .is-voice-standby {
            box-shadow: 0 0 25px 4px rgba(14, 165, 233, 0.5) !important;
        }

        @keyframes listeningPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .book-model { position: relative; transform-style: preserve-3d; width: 44%; height: 64%; transform: translateX(22%); transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .book-right-page { position: absolute; inset: 0; background: #fffdfa !important; background-image: linear-gradient(to right, #f2ece4 0%, #fffdfa 12%, #fffdfa 100%); border-radius: 0 6px 6px 0; border: 1px solid #e2e8f0; z-index: 5; display: flex; align-items: center; justify-content: center; box-shadow: 10px 10px 30px rgba(0,0,0,0.1); transform-style: preserve-3d; }
        .book-cover-leaf { position: absolute; inset: 0; transform-origin: left center; z-index: 50; transform-style: preserve-3d; backface-visibility: visible; }
        .cover-front { position: absolute; inset: 0; background: #fffdfa !important; border: 2px solid #0ea5e9; border-radius: 0 6px 6px 0; backface-visibility: hidden; z-index: 2; }
        .cover-back { position: absolute; inset: 0; background: #fffdfa !important; background-image: linear-gradient(to left, #f2ece4 0%, #fffdfa 15%, #fffdfa 100%); transform: rotateY(180deg); backface-visibility: hidden; border: 1px solid #e2e8f0; border-radius: 6px 0 0 6px; z-index: 1; }
        .book-turning-leaf { position: absolute; inset: 1px; background: #fffdfa !important; background-image: linear-gradient(to right, #f2ece4 0%, #fffdfa 18%, #fffdfa 100%); border-radius: 0 6px 6px 0; border: 1px solid #f1f5f9; transform-origin: left center; z-index: 40; opacity: 0; backface-visibility: hidden; }
        .book-spine-line { position: absolute; left: -1px; top: 0; bottom: 0; width: 4px; background: rgba(0,0,0,0.15); z-index: 100; }

        .anim-open { animation: butterflyOpenAction 2.2s 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .anim-page { animation: butterflyPageAction 2.6s 1s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .signature-reveal { animation: signatureRevealAction 3.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }

        /* UI APP */
        .card-premium { background: white; border-radius: 1.25rem; border: 1px solid #f1f5f9; box-shadow: 0 2px 8px -4px rgba(0,0,0,0.02); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; overflow: hidden; }
        .card-premium.is-expanded { border-radius: 1.75rem; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.06); border-color: #e2e8f0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .btn-ai-pill { font-size: 7px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em; padding: 8px 12px; border-radius: 9999px; transition: all 0.2s ease; display: flex; align-items: center; gap: 4px; border: 1px solid transparent; }
        .ai-chat-bubble { background: #f8fafc; border-radius: 1rem; padding: 0.85rem; margin-top: 0.75rem; border-left: 3px solid #0ea5e9; font-size: 11px; font-style: italic; color: #475569; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = { 
            apiKey: "AIzaSyDS-n8NcoNTJ21FUb_MdOaPnX75EW2KIh8",
            authDomain: "dico-ai.firebaseapp.com",
            projectId: "dico-ai",
            storageBucket: "dico-ai.firebasestorage.app",
            messagingSenderId: "1083255726513",
            appId: "1:1083255726513:web:21d2af14a9efd449b0dd90"
        };
        
        const apiKey = ""; 
        const appIdStr = "dico-ai-heritage-alex-final-v22";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Helper PCM to WAV
        const pcmToWav = (pcmData, sampleRate) => {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeStr(0, 'RIFF'); view.setUint32(4, 36 + pcmData.length, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data');
            view.setUint32(40, pcmData.length, true);
            for (let i = 0; i < pcmData.length; i++) view.setUint8(44 + i, pcmData[i]);
            return new Blob([buffer], { type: 'audio/wav' });
        };

        const LANGUAGES_DB = [
            { id: 'en', name: 'Anglais' }, { id: 'es', name: 'Espagnol' }, { id: 'de', name: 'Allemand' },
            { id: 'it', name: 'Italien' }, { id: 'ja', name: 'Japonais' }, { id: 'zh', name: 'Chinois' },
            { id: 'ar', name: 'Arabe' }
        ];

        const IconPlay = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>;
        const IconGlobe = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>;
        const IconMic = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>;
        const IconPlus = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconTrash = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const IconVolume = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07"/></svg>;
        const IconBrain = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.04zM14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-2.04z"/></svg>;

        const DicoLogo = ({ size = 90, animated = true, listening = false, isVoiceMode = false }) => {
            return (
                <div className="book-viewport" style={{ width: size, height: size }}>
                    <div className={`alex-frame-box w-full h-full ${listening ? 'is-listening-logo' : (isVoiceMode ? 'is-voice-standby' : '')}`}>
                        <div className="book-model">
                            <div className="book-spine-line" />
                            <div className="book-right-page">
                                <div className={animated ? "signature-reveal flex flex-col items-end pointer-events-none" : "flex flex-col items-end pointer-events-none"} style={{ transform: 'translateX(-4px)' }}>
                                    <span style={{ color: '#0ea5e9', fontSize: size * 0.12, fontWeight: '300', fontStyle: 'normal', whiteSpace: 'nowrap', lineHeight: '1' }}>DiCo Ai</span>
                                    <span style={{ color: '#1a1a1a', fontSize: size * 0.055, fontWeight: '700', fontStyle: 'italic', marginTop: '0.1em', marginRight: '0.55em' }}>Pro</span>
                                </div>
                            </div>
                            <div className={`book-turning-leaf ${animated ? 'anim-page' : ''}`} style={!animated ? { transform: 'rotateY(-165deg)', opacity: 1 } : {}} />
                            <div className={`book-cover-leaf ${animated ? 'anim-open' : ''}`} style={!animated ? { transform: 'rotateY(-180deg)' } : {}}>
                                <div className="cover-front" />
                                <div className="cover-back" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [hasStarted, setHasStarted] = useState(false);
            const [words, setWords] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [activeLangTab, setActiveLangTab] = useState('fr'); 
            const [activeCategoryTab, setActiveCategoryTab] = useState('all');
            const [loading, setLoading] = useState(false);
            const [isVoice, setIsVoice] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [selectedLangs, setSelectedLangs] = useState(['en']); 
            const [langMenuOpen, setLangMenuOpen] = useState(false);
            const [expandedId, setExpandedId] = useState(null);
            
            const lastWordRef = useRef(null);
            const recognitionRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (user && hasStarted) {
                    const q = db.collection('artifacts').doc(appIdStr).collection('users').doc(user.uid).collection('dictionary');
                    return q.onSnapshot(snap => setWords(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                }
            }, [user, hasStarted]);

            const callGemini = async (prompt, system = "Expert IA.") => {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: system }] } })
                    });
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.[0]?.parts?.[0]?.text || data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) { throw e; }
            };

            // --- RECONNAISSANCE VOCALE MOBILE RENFORCÉE ---
            const startListening = () => {
                const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!Rec) return;
                
                if (recognitionRef.current) { 
                    try { recognitionRef.current.stop(); } catch(e) {} 
                }
                
                const rec = new Rec(); 
                rec.lang = 'fr-FR';
                rec.continuous = false;
                rec.interimResults = false;

                rec.onstart = () => { setIsListening(true); };
                rec.onresult = (e) => { 
                    setIsListening(false); 
                    const transcript = e.results[0][0].transcript;
                    processEncoding(transcript); 
                };
                rec.onerror = (err) => {
                    setIsListening(false);
                };
                rec.onend = () => { setIsListening(false); };
                
                recognitionRef.current = rec;
                try { rec.start(); } catch(e) { setIsListening(false); }
            };

            const playGeminiTTS = async (text, startMicAfter = false) => {
                // Sur smartphone : on ouvre le micro dès le clic pour garder le lien avec le geste utilisateur
                if (startMicAfter && isVoice) { startListening(); }

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: text }] }],
                            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } },
                            model: "gemini-2.5-flash-preview-tts"
                        })
                    });
                    const result = await res.json();
                    const audioData = result.candidates[0].content.parts[0].inlineData;
                    const audio = new Audio(URL.createObjectURL(pcmToWav(atob(audioData.data).split("").map(c => c.charCodeAt(0)), 24000)));
                    
                    audio.onplay = () => { if(startMicAfter) setIsListening(false); }; // Signal bleu pendant que l'IA parle
                    audio.onended = () => { if(startMicAfter) setIsListening(true); }; // Signal rouge quand l'IA se tait
                    audio.play();
                } catch (e) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'fr-FR';
                    u.onend = () => { if (startMicAfter) setIsListening(true); };
                    window.speechSynthesis.speak(u);
                }
            };

            // --- FONCTION DE TRAITEMENT CORRIGÉE POUR MOBILE ---
            const processEncoding = async (textOverride) => {
                // On récupère le texte manuel (input) ou automatique (micro)
                const targetText = (textOverride || inputValue || "").trim();
                
                if (!targetText || loading) return;
                
                setLoading(true);
                
                const isFollowUp = lastWordRef.current && (targetText.toLowerCase().includes("nuance") || targetText.toLowerCase().includes("synonyme") || targetText.toLowerCase().includes("mnémo") || targetText.toLowerCase().includes("situation") || targetText.toLowerCase().includes("pop"));

                if (isFollowUp) {
                    const type = (targetText.includes("nuance") || targetText.includes("synonyme")) ? 'nuances' : 
                                 targetText.includes("mnémo") ? 'mnemonic' :
                                 targetText.includes("situation") ? 'scenarios' : 'pop';
                    const res = await handleImprove(lastWordRef.current.id, lastWordRef.current.term, type);
                    playGeminiTTS(res, true);
                    return;
                }

                try {
                    const targets = selectedLangs.map(id => LANGUAGES_DB.find(l => l.id === id).name).join(', ');
                    const prompt = `Analyse "${targetText}". Réponds en JSON: {"category":"mot"|"proverbe"|"nom","term":"corrigé","definition":"explication","translations":[{"lang":"langue","text":"traduction"}]}. Traduis en : ${targets}.`;
                    const resText = await callGemini(prompt);
                    const result = JSON.parse(resText.match(/\{[\s\S]*\}/)[0]);
                    const docRef = await db.collection('artifacts').doc(appIdStr).collection('users').doc(user.uid).collection('dictionary').add({ ...result, createdAt: Date.now() });
                    
                    lastWordRef.current = { id: docRef.id, term: result.term };
                    setInputValue(''); 
                    setExpandedId(docRef.id);
                    if (isVoice) playGeminiTTS(`${result.term}. ${result.definition}`, true);
                } catch(e) { 
                    console.error("Erreur d'analyse IA");
                } finally { 
                    setLoading(false); 
                }
            };

            const handleImprove = async (id, term, type) => {
                if (loading) return;
                setLoading(true);
                const prompts = {
                    nuances: `Donne les synonymes, antonymes et nuances précises de "${term}".`,
                    mnemonic: `Donne une astuce mnémonique mémorable pour "${term}".`,
                    scenarios: `Donne 2 exemples de situations concrètes d'utilisation pour "${term}".`,
                    pop: `Donne des références pop-culture (film, livre, chanson) liées à "${term}".`
                };
                try {
                    const res = await callGemini(prompts[type]);
                    await db.collection('artifacts').doc(appIdStr).collection('users').doc(user.uid).collection('dictionary').doc(id).update({ [type]: res });
                    return res;
                } catch(e) { console.error(e); } finally { setLoading(false); }
            };

            const filteredData = useMemo(() => {
                let list = words;
                if (activeCategoryTab !== 'all') list = list.filter(w => w.category === activeCategoryTab);
                if (activeLangTab !== 'fr') {
                    const langName = LANGUAGES_DB.find(l => l.id === activeLangTab)?.name;
                    list = list.filter(w => w.translations?.some(t => t.lang === langName));
                }
                return list.sort((a, b) => (a.term || "").localeCompare(b.term || "", 'fr', { sensitivity: 'base' }));
            }, [words, activeCategoryTab, activeLangTab]);

            if (!hasStarted) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white p-4 text-center animate-in fade-in overflow-hidden">
                    <div className="mb-8"><DicoLogo size={220} animated={true} /></div>
                    <button onClick={() => { if (!user) auth.signInAnonymously(); setHasStarted(true); }} className="w-full max-w-[220px] bg-sky-500 text-white py-4 rounded-[2rem] shadow-lg font-bold uppercase tracking-[0.3em] active:scale-95 transition-all text-[9px] flex items-center justify-center gap-3">
                        <IconPlay /> Démarrer
                    </button>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#fdfdfd] flex flex-col overflow-x-hidden pb-32">
                    <header className="p-4 pt-6 flex flex-col items-center border-b border-slate-50 gap-2 relative z-30">
                        <DicoLogo size={90} animated={false} listening={isListening} isVoiceMode={isVoice} />
                        <div className="absolute right-4 top-6">
                            <button onClick={() => setHasStarted(false)} className="text-slate-200 p-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
                        </div>
                    </header>

                    <div className="bg-white p-3 space-y-3 sticky top-0 z-20 shadow-sm">
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                            <button onClick={() => setActiveLangTab('fr')} className={`px-3 py-1.5 rounded-full text-[8px] uppercase font-bold tracking-widest transition-all whitespace-nowrap ${activeLangTab === 'fr' ? 'bg-slate-900 text-white shadow-md' : 'bg-slate-50 text-slate-400'}`}>Français</button>
                            {selectedLangs.map(id => (
                                <button key={id} onClick={() => setActiveLangTab(id)} className={`px-3 py-1.5 rounded-full text-[8px] uppercase font-bold tracking-widest transition-all whitespace-nowrap ${activeLangTab === id ? 'bg-sky-500 text-white shadow-md' : 'bg-slate-50 text-slate-400'}`}>
                                    {LANGUAGES_DB.find(l => l.id === id)?.name}
                                </button>
                            ))}
                        </div>
                        <div className="flex gap-2 justify-center">
                            {['all', 'mot', 'proverbe', 'nom'].map(cat => (
                                <button key={cat} onClick={() => setActiveCategoryTab(cat)} className={`px-2 py-1 rounded-full text-[7px] uppercase font-bold tracking-widest transition-all ${activeCategoryTab === cat ? 'text-sky-600 border-b-2 border-sky-600' : 'text-slate-300'}`}>{cat}</button>
                            ))}
                        </div>
                    </div>

                    <main className="flex-1 p-3 space-y-2 overflow-y-auto no-scrollbar">
                        <div className="space-y-2 max-w-full">
                            {filteredData.map(w => {
                                const isExpanded = expandedId === w.id;
                                return (
                                    <div key={w.id} className={`p-4 card-premium animate-in fade-in ${isExpanded ? 'is-expanded' : ''}`} onClick={() => { setExpandedId(isExpanded ? null : w.id); lastWordRef.current = {id: w.id, term: w.term}; }}>
                                        <div className="flex justify-between items-center">
                                            <h3 className={`font-light italic text-slate-800 capitalize transition-all ${isExpanded ? 'text-lg mb-3' : 'text-sm'}`}>
                                                {activeLangTab === 'fr' ? w.term : (w.translations?.find(t => t.lang === LANGUAGES_DB.find(l => l.id === activeLangTab)?.name)?.text || w.term)}
                                            </h3>
                                            {!isExpanded && <span className="text-[5px] uppercase tracking-widest text-sky-400 font-bold bg-sky-50 px-1 py-0.5 rounded-full">{w.category}</span>}
                                        </div>

                                        {isExpanded && (
                                            <div className="animate-in slide-in-from-top-1 duration-200">
                                                <div className="flex justify-between items-start mb-3">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-[8px] uppercase tracking-widest text-sky-500 font-bold bg-sky-50 px-2 py-1 rounded-full">{w.category}</span>
                                                        <button onClick={(e) => { e.stopPropagation(); playGeminiTTS(`${w.term}. ${w.definition}`); }} className="text-sky-200 p-1"><IconVolume /></button>
                                                    </div>
                                                    <button onClick={(e) => { e.stopPropagation(); db.collection('artifacts').doc(appIdStr).collection('users').doc(user.uid).collection('dictionary').doc(w.id).delete(); }} className="text-slate-100 p-1"><IconTrash /></button>
                                                </div>
                                                <p className="text-xs text-slate-500 leading-relaxed font-light mb-4 italic">{w.definition}</p>
                                                <div className="flex flex-wrap gap-1.5 mb-4 border-t border-slate-50 pt-4">
                                                    <button onClick={(e) => { e.stopPropagation(); handleImprove(w.id, w.term, 'nuances'); }} className="btn-ai-pill bg-indigo-50 text-indigo-600">Nuances ✨</button>
                                                    <button onClick={(e) => { e.stopPropagation(); handleImprove(w.id, w.term, 'mnemonic'); }} className="btn-ai-pill bg-amber-50 text-amber-600">Mnémo ✨</button>
                                                    <button onClick={(e) => { e.stopPropagation(); handleImprove(w.id, w.term, 'scenarios'); }} className="btn-ai-pill bg-emerald-50 text-emerald-600">Situations ✨</button>
                                                    <button onClick={(e) => { e.stopPropagation(); handleImprove(w.id, w.term, 'pop'); }} className="btn-ai-pill bg-rose-50 text-rose-600">Pop ✨</button>
                                                </div>
                                                <div className="space-y-2">
                                                    {w.nuances && <div className="ai-chat-bubble"><b>Nuances :</b> {w.nuances}</div>}
                                                    {w.mnemonic && <div className="ai-chat-bubble"><b>Mnémo :</b> {w.mnemonic}</div>}
                                                    {w.scenarios && <div className="ai-chat-bubble"><b>Situations :</b> {w.scenarios}</div>}
                                                    {w.pop && <div className="ai-chat-bubble"><b>Pop :</b> {w.pop}</div>}
                                                    {w.translations && w.translations.length > 0 && (
                                                        <div className="mt-4 pt-4 border-t border-slate-50 space-y-2">
                                                            <h4 className="text-[7px] uppercase font-bold tracking-widest text-slate-300">Traductions</h4>
                                                            {w.translations.map((tr, idx) => (
                                                                <div key={idx} className="flex items-center justify-between">
                                                                    <span className="text-[8px] font-bold text-slate-400 uppercase">{tr.lang}</span>
                                                                    <span className="text-sm font-light text-slate-400 italic cursor-pointer" onClick={(e) => { e.stopPropagation(); playGeminiTTS(tr.text); }}>{tr.text}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {langMenuOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/10 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-xs rounded-[2rem] shadow-2xl p-5">
                                <h4 className="text-[9px] uppercase font-bold text-slate-400 mb-4 text-center tracking-widest">Langues Actives</h4>
                                <div className="max-h-52 overflow-y-auto no-scrollbar space-y-1 mb-4">
                                    {LANGUAGES_DB.map(l => (
                                        <button key={l.id} onClick={() => setSelectedLangs(prev => prev.includes(l.id) ? (prev.length > 1 ? prev.filter(x => x !== l.id) : prev) : [...prev, l.id])} className={`w-full text-left p-3 rounded-xl text-[10px] flex justify-between border ${selectedLangs.includes(l.id) ? 'bg-sky-50 text-sky-600 font-bold border-sky-100' : 'text-slate-400 border-transparent'}`}> {l.name} {selectedLangs.includes(l.id) && "✓"}</button>
                                    ))}
                                </div>
                                <button onClick={() => setLangMenuOpen(false)} className="w-full py-3 bg-slate-900 text-white rounded-xl text-[8px] font-bold uppercase tracking-widest">Confirmer</button>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-white via-white/95 to-transparent z-50">
                        <div className="max-w-md mx-auto">
                            {/* FORMULAIRE POUR VALIDATION MOBILE GARANTIE ✨ */}
                            <form 
                                onSubmit={(e) => { 
                                    e.preventDefault(); 
                                    processEncoding(); 
                                }} 
                                className="bg-white rounded-[2.5rem] shadow-xl p-2 flex items-center gap-1 border border-slate-100"
                            >
                                <button type="button" onClick={() => setLangMenuOpen(true)} className="p-3 text-slate-200 transition-all focus:outline-none">
                                    <IconGlobe />
                                </button>
                                <button 
                                    type="button" 
                                    onClick={() => { 
                                        const next = !isVoice; 
                                        setIsVoice(next); 
                                        if (next) { playGeminiTTS("Je t'écoute Alex.", true); } 
                                        else { setIsListening(false); if (recognitionRef.current) try { recognitionRef.current.stop(); } catch(e) {} }
                                    }} 
                                    className={`p-3 rounded-full transition-all focus:outline-none ${isVoice ? (isListening ? 'is-listening-logo shadow-md text-white' : 'bg-slate-900 text-white shadow-md') : 'text-slate-200'}`}
                                >
                                    <IconMic />
                                </button>
                                <input 
                                    type="text" 
                                    placeholder="Indexer..." 
                                    className="flex-1 bg-transparent px-2 py-3 outline-none font-light italic text-slate-700 text-sm" 
                                    value={inputValue} 
                                    onChange={e => setInputValue(e.target.value)} 
                                    enterKeyHint="done" 
                                    autoComplete="off" 
                                />
                                <button 
                                    type="submit" 
                                    disabled={loading} 
                                    className="bg-sky-500 text-white p-3 rounded-full shadow-lg active:scale-90 flex items-center justify-center min-w-[40px] min-h-[40px]"
                                >
                                    {loading ? <div className="w-3 h-3 border-2 border-white/20 border-t-white rounded-full animate-spin"></div> : <IconPlus />}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

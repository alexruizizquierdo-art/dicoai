<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DICO AI - Version Officielle</title>
    
    <!-- Scripts de base -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; color: #0f172a; margin: 0; padding: 0; min-height: 100vh; font-weight: 200; }
        .font-light { font-weight: 200; }
        .tracking-tight { letter-spacing: -0.025em; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        .word-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-press:active { transform: scale(0.96); }
        input { font-size: 16px !important; }
        .loader-spin {
            border: 2px solid #e2e8f0; border-top: 2px solid #0ea5e9;
            border-radius: 50%; width: 20px; height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURATION OBLIGATOIRE ---
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "TON_PROJET.firebaseapp.com",
            projectId: "TON_PROJET_ID",
            storageBucket: "TON_PROJET.appspot.com",
            messagingSenderId: "TON_SENDER_ID",
            appId: "TON_APP_ID"
        };

        const geminiKey = "TA_CLE_GEMINI_ICI"; 

        // --- INITIALISATION ---
        try {
            firebase.initializeApp(firebaseConfig);
        } catch(e) {}
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- UTILITAIRES ---
        function pcmToWav(pcmBase64, sampleRate = 24000) {
            const byteCharacters = atob(pcmBase64);
            const pcmData = new Int16Array(byteCharacters.length / 2);
            for (let i = 0; i < pcmData.length; i++) {
                pcmData[i] = (byteCharacters.charCodeAt(i * 2 + 1) << 8) | byteCharacters.charCodeAt(i * 2);
            }
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
            return new Blob([view], { type: 'audio/wav' });
        }

        // --- COMPOSANTS ---
        
        // Logo Abstrait Livre Ouvert
        const DicoLogo = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full">
                {/* Dos du livre / Reliure centrale */}
                <path d="M12 21V7" opacity="0.4" />
                {/* Page de gauche courbe */}
                <path d="M12 7c-4-3-9-3-10-1v13c1-2 6-2 10 1" />
                {/* Page de droite courbe */}
                <path d="M12 7c4-3 9-3 10-1v13c-1-2-6-2-10 1" />
                {/* Lignes de texte suggérées (très subtiles) */}
                <path d="M14 10h4" opacity="0.2" />
                <path d="M14 13h4" opacity="0.2" />
                <path d="M6 10h4" opacity="0.2" />
            </svg>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [words, setWords] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [isDrivingMode, setIsDrivingMode] = useState(false);
            const [error, setError] = useState(null);
            
            const recognitionRef = useRef(null);
            const audioRef = useRef(null);

            useEffect(() => {
                return auth.onAuthStateChanged(u => setUser(u));
            }, []);

            useEffect(() => {
                if (user) {
                    return db.collection("users").doc(user.uid).collection("dictionary")
                        .orderBy("createdAt", "desc")
                        .onSnapshot(snap => {
                            setWords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        }, (err) => setError("Erreur de synchronisation Firestore."));
                }
            }, [user]);

            const callGemini = async (prompt) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) { 
                    setError("Clé Gemini requise pour l'IA.");
                    return null; 
                }
            };

            const speak = async (text, onEnd) => {
                if (audioRef.current) audioRef.current.pause();
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${geminiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });
                    const result = await response.json();
                    const data = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (data) {
                        const audio = new Audio(URL.createObjectURL(pcmToWav(data)));
                        audioRef.current = audio;
                        audio.onended = onEnd;
                        audio.play();
                    } else { onEnd?.(); }
                } catch { 
                    const ut = new SpeechSynthesisUtterance(text);
                    ut.lang = 'fr-FR';
                    ut.onend = onEnd;
                    window.speechSynthesis.speak(ut);
                }
            };

            const handleAddWord = async (text) => {
                const term = text || inputValue;
                if (!term || term.length < 2) return;
                setIsLoading(true);
                setError(null);

                const corrected = await callGemini(`Corrige l'orthographe de : "${term}". Réponds uniquement par le mot.`);
                const finalTerm = corrected?.trim() || term.trim();
                const definition = await callGemini(`Donne une définition courte (max 15 mots) pour : "${finalTerm}".`);

                if (!definition) {
                    setIsLoading(false);
                    return;
                }

                await db.collection("users").doc(user.uid).collection("dictionary").add({
                    term: finalTerm,
                    definition,
                    createdAt: Date.now()
                });

                setInputValue('');
                setIsLoading(false);
                speak(definition, () => {
                    if (isDrivingMode) startListening();
                });
            };

            const startListening = () => {
                const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!Speech) return setError("Micro non supporté.");
                const rec = new Speech();
                rec.lang = 'fr-FR';
                rec.onstart = () => setIsListening(true);
                rec.onend = () => setIsListening(false);
                rec.onresult = (e) => handleAddWord(e.results[0][0].transcript);
                rec.start();
            };

            const signWithGoogle = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                } catch (e) { setError("Erreur de connexion."); }
            };

            if (!user) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-8 bg-slate-50 font-light">
                        <div className="w-full max-w-sm space-y-12 animate-in fade-in duration-1000">
                            <div className="text-center space-y-6">
                                <div className="w-24 h-24 mx-auto p-5 bg-sky-500 rounded-[2.5rem] shadow-2xl text-white">
                                    <DicoLogo />
                                </div>
                                <h1 className="text-5xl font-light italic tracking-tighter text-sky-600 uppercase">Dico AI</h1>
                                <p className="text-slate-400 font-light italic tracking-tight opacity-70 leading-tight">L'intelligence artificielle<br/>au service de votre lexique.</p>
                            </div>

                            <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100 space-y-6">
                                <button onClick={signWithGoogle} className="w-full flex items-center justify-center gap-3 py-4 border border-slate-100 rounded-2xl text-slate-600 hover:bg-slate-50 transition-all btn-press font-light tracking-tight">
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" />
                                    <span>Continuer avec Google</span>
                                </button>
                                
                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t border-slate-50"></div>
                                    <span className="mx-4 text-[10px] text-slate-300 uppercase tracking-widest">Ou compte email</span>
                                    <div className="flex-grow border-t border-slate-50"></div>
                                </div>

                                <div className="space-y-4">
                                    <input id="email" type="email" placeholder="Email" className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none italic font-light border border-transparent focus:border-sky-200 transition-all" />
                                    <input id="pass" type="password" placeholder="Mot de passe" className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none italic font-light border border-transparent focus:border-sky-200 transition-all" />
                                    <button 
                                        onClick={() => {
                                            const e = document.getElementById('email').value;
                                            const p = document.getElementById('pass').value;
                                            auth.signInWithEmailAndPassword(e, p).catch(() => setError("Erreur de connexion."));
                                        }} 
                                        className="w-full bg-sky-500 text-white py-4 rounded-2xl shadow-lg font-light tracking-widest uppercase text-sm btn-press transition-all"
                                    >
                                        Connexion
                                    </button>
                                    <button 
                                        onClick={() => {
                                            const e = document.getElementById('email').value;
                                            const p = document.getElementById('pass').value;
                                            auth.createUserWithEmailAndPassword(e, p).catch(() => setError("Erreur d'inscription."));
                                        }}
                                        className="w-full py-2 text-sky-400 text-xs font-light tracking-widest uppercase hover:underline"
                                    >
                                        Créer un compte
                                    </button>
                                </div>
                            </div>
                        </div>
                        {error && (
                            <div className="fixed bottom-10 left-6 right-6 bg-red-500 text-white p-4 rounded-2xl shadow-xl flex justify-between items-center text-xs">
                                <span>{error}</span>
                                <button onClick={() => setError(null)}><i data-lucide="x" className="w-4"></i></button>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className={`flex-1 flex flex-col font-light transition-all duration-700 ${isDrivingMode ? 'bg-sky-950 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    <header className={`p-6 rounded-b-[2.5rem] sticky top-0 z-30 backdrop-blur-md border-b ${isDrivingMode ? 'bg-sky-900/80 border-sky-800' : 'bg-white/80 border-slate-100'}`}>
                        <div className="max-w-md mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 p-2 rounded-2xl bg-sky-500 text-white shadow-xl"><DicoLogo /></div>
                                <h1 className="text-2xl font-light tracking-tighter italic uppercase text-sky-600">DICO AI</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => auth.signOut()} className="p-2 text-slate-300 hover:text-red-400 btn-press"><i data-lucide="log-out" className="w-5"></i></button>
                                <button onClick={() => { setIsDrivingMode(!isDrivingMode); if(!isDrivingMode) speak("Dico A.I prêt."); }} 
                                        className={`px-4 py-2 rounded-2xl text-[10px] tracking-widest uppercase transition-all btn-press ${isDrivingMode ? 'bg-orange-500 text-white shadow-lg animate-pulse' : 'bg-slate-100 text-slate-400'}`}>
                                    {isDrivingMode ? 'ON' : 'MODE AUTO'}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto w-full p-4 flex-1 space-y-6 pb-40">
                        {isDrivingMode ? (
                            <div className="py-20 text-center space-y-8 animate-in fade-in">
                                <div className={`w-32 h-32 mx-auto rounded-full flex items-center justify-center transition-all ${isListening ? 'bg-orange-500 shadow-2xl scale-110' : 'bg-sky-900/50 border border-sky-700'}`}>
                                    <i data-lucide="mic" className={`w-10 ${isListening ? 'text-white' : 'text-sky-300'}`}></i>
                                </div>
                                <h2 className="text-xl italic uppercase tracking-widest text-sky-200">Écoute active...</h2>
                            </div>
                        ) : (
                            <>
                                <div className="relative group">
                                    <i data-lucide="search" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 w-4 group-focus-within:text-sky-500"></i>
                                    <input type="text" placeholder="Rechercher un mot..." className="w-full pl-12 pr-6 py-5 bg-white rounded-[2rem] shadow-sm border border-slate-100 italic outline-none focus:ring-1 focus:ring-sky-100 font-light" />
                                </div>
                                
                                <div className="space-y-4">
                                    {words.map(w => (
                                        <div key={w.id} className="p-6 bg-white rounded-[2rem] shadow-sm border border-slate-50 flex justify-between items-start word-card active:scale-[0.98]">
                                            <div className="flex-1" onClick={() => speak(w.definition)}>
                                                <h3 className="text-2xl italic tracking-tight mb-2 text-slate-800 font-light">{w.term}</h3>
                                                <p className="text-sm opacity-60 leading-relaxed font-light">{w.definition}</p>
                                            </div>
                                            <button onClick={() => db.collection("users").doc(user.uid).collection("dictionary").doc(w.id).delete()} 
                                                    className="p-2 text-slate-200 hover:text-red-400 transition-colors btn-press">
                                                <i data-lucide="trash-2" className="w-4"></i>
                                            </button>
                                        </div>
                                    ))}
                                    {words.length === 0 && <p className="text-center py-20 text-slate-300 italic font-light">Votre dictionnaire est vide.</p>}
                                </div>
                            </>
                        )}
                    </main>

                    {!isDrivingMode && (
                        <div className="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-slate-50 to-transparent pointer-events-none">
                            <div className="max-w-md mx-auto bg-white rounded-[3rem] shadow-2xl p-2 flex items-center gap-2 border border-slate-100 pointer-events-auto">
                                <input type="text" placeholder="Nouveau mot..." className="flex-1 bg-transparent px-8 py-5 outline-none italic font-light" 
                                       value={inputValue} onChange={(e) => setInputValue(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleAddWord()} />
                                <button onClick={startListening} className={`p-5 rounded-[2rem] transition-all btn-press ${isListening ? 'bg-red-500 text-white shadow-lg animate-pulse' : 'bg-slate-50 text-slate-300'}`}>
                                    <i data-lucide="mic" className="w-6"></i>
                                </button>
                                <button onClick={() => handleAddWord()} className="bg-sky-500 text-white p-5 rounded-[2rem] shadow-xl hover:bg-sky-600 btn-press min-w-[70px] flex items-center justify-center transition-all">
                                    {isLoading ? <div className="loader-spin border-t-white"></div> : <i data-lucide="plus" className="w-6"></i>}
                                </button>
                            </div>
                        </div>
                    )}

                    {error && (
                        <div className="fixed top-24 left-6 right-6 bg-red-600 text-white p-4 rounded-[1.5rem] shadow-2xl z-[100] flex justify-between items-center text-xs animate-in slide-in-from-top">
                            <div className="flex items-center gap-2"><i data-lucide="alert-circle" className="w-4"></i><span>{error}</span></div>
                            <button onClick={() => setError(null)}><i data-lucide="x" className="w-4"></i></button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => lucide && lucide.createIcons(), 1000);
    </script>
</body>
</html>

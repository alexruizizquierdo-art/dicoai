<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DiCO Ai</title>
    
    <!-- PWA / Mobile Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DiCO Ai">
    <meta name="theme-color" content="#0ea5e9">
    
    <link rel="manifest" href='data:application/json,{"name":"DiCO Ai","short_name":"DiCOAi","start_url":".","display":"standalone","background_color":"#f8fafc","theme_color":"#0ea5e9","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3429/3429149.png","sizes":"512x512","type":"image/png"}]}'>

    <!-- Scripts stables -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: #f8fafc; color: #0f172a; margin: 0; padding: 0; min-height: 100vh; font-weight: 200; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .font-light { font-weight: 200; font-style: normal; }
        .tracking-tight { letter-spacing: -0.025em; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        
        /* --- ANIMATIONS DU LOGO (PRO) --- */
        .logo-slide-in {
            animation: slideFromRight 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }
        @keyframes slideFromRight {
            0% { transform: translateX(60vw); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .book-perspective { perspective: 1000px; position: relative; }
        
        .page-turn-once {
            transform-origin: left center;
            animation: turnPageFinal 1s 1.2s cubic-bezier(0.645, 0.045, 0.355, 1) forwards;
            backface-visibility: hidden;
            position: absolute;
            top: 0; left: 50%;
            height: 100%; width: 50%;
            z-index: 10;
        }
        @keyframes turnPageFinal {
            0% { transform: rotateY(0deg); opacity: 1; }
            100% { transform: rotateY(-180deg); opacity: 0; }
        }

        /* UI Styles */
        .word-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(226, 232, 240, 0.5); }
        .btn-press:active { transform: scale(0.96); opacity: 0.8; }
        input { font-size: 16px !important; }

        /* Toasts */
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { pointer-events: auto; animation: slideDown 0.4s ease forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .loader-spin { border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "TON_PROJET.firebaseapp.com",
            projectId: "TON_PROJET_ID",
            storageBucket: "TON_PROJET.appspot.com",
            messagingSenderId: "TON_SENDER_ID",
            appId: "TON_APP_ID"
        };
        const geminiKey = "TA_CLE_GEMINI_ICI"; 

        // Initialisation
        try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); } catch(e) {}
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- COMPOSANTS UI ---

        const Toast = ({ msg, remove }) => {
            useEffect(() => { const t = setTimeout(remove, 3000); return () => clearTimeout(t); }, []);
            const styles = { success: "bg-emerald-500", error: "bg-rose-500", info: "bg-sky-600" };
            return (
                <div className={`toast flex items-center gap-3 p-4 mb-2 rounded-2xl text-white shadow-xl ${styles[msg.type] || styles.info}`}>
                    <i data-lucide={msg.type === 'error' ? 'alert-circle' : msg.type === 'success' ? 'check-circle' : 'info'} className="w-5 h-5"></i>
                    <span className="text-sm font-light tracking-tight">{msg.text}</span>
                </div>
            );
        };

        const DicoLogo = ({ animated = false, size = "40px", color = "currentColor", bgTheme = "#0ea5e9" }) => (
            <div className={`book-perspective ${animated ? 'logo-slide-in' : ''}`} style={{ width: size, height: size }}>
                <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full">
                    <path d="M12 20c-3-1.5-7-1.5-10 0V6c3-1.5 7-1.5 10 0 3-1.5 7-1.5 10 0v14c-3-1.5-7-1.5-10 0z" fill={color} fillOpacity="0.1" />
                    <line x1="12" y1="5" x2="12" y2="20" strokeWidth="1.5" opacity="0.8" />
                    {animated && (
                        <g className="page-turn-once">
                            <path d="M0 0c3.5-1.5 7-1.5 10 0v14c-3-1.5-7-1.5-10 0V0z" transform="translate(12, 5)" fill={color === "white" ? bgTheme : "white"} fillOpacity="0.95" stroke={color} />
                        </g>
                    )}
                </svg>
            </div>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [authMode, setAuthMode] = useState('welcome');
            const [words, setWords] = useState([]);
            const [search, setSearch] = useState('');
            const [sortBy, setSortBy] = useState('date');
            const [toasts, setToasts] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isDrivingMode, setIsDrivingMode] = useState(false);
            const [expandedId, setExpandedId] = useState(null);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');

            const addToast = (text, type = 'info') => setToasts(prev => [...prev, { id: Date.now(), text, type }]);
            const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => { setUser(u); setIsAuthReady(true); });
                return unsub;
            }, []);

            useEffect(() => {
                if (user && firebaseConfig.apiKey !== "TON_API_KEY") {
                    return db.collection("users").doc(user.uid).collection("dictionary")
                        .orderBy("createdAt", "desc")
                        .onSnapshot(snap => {
                            setWords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        });
                }
            }, [user]);

            const filteredWords = useMemo(() => {
                let res = words.filter(w => 
                    w.term.toLowerCase().includes(search.toLowerCase()) || 
                    w.definition.toLowerCase().includes(search.toLowerCase()) ||
                    (w.example && w.example.toLowerCase().includes(search.toLowerCase()))
                );
                if (sortBy === 'alpha') res.sort((a, b) => a.term.localeCompare(b.term));
                if (sortBy === 'fav') res = res.filter(w => w.favorite);
                return res;
            }, [words, search, sortBy]);

            const handleAddWord = async (text) => {
                const term = (text || inputValue).trim();
                if (term.length < 2) return;
                
                // Amélioration Claude 2 : Détection des doublons
                if (words.some(w => w.term.toLowerCase() === term.toLowerCase())) {
                    addToast(`"${term}" est déjà dans ton dico !`, 'error');
                    return;
                }

                setIsLoading(true);
                try {
                    // Amélioration Claude 1 : 1 seul appel API riche
                    const prompt = `Analyse ce mot: "${term}". Réponds UNIQUEMENT en JSON: {"term": "mot corrigé", "definition": "courte", "phonetic": "ipa", "type": "nature", "example": "phrase", "etymology": "origine"}`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    const aiResult = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));

                    await db.collection("users").doc(user.uid).collection("dictionary").add({
                        ...aiResult,
                        favorite: false,
                        createdAt: Date.now()
                    });
                    
                    addToast(`"${aiResult.term}" ajouté avec succès.`, 'success');
                    setInputValue('');
                } catch (e) {
                    addToast("Erreur IA ou configuration.", 'error');
                } finally { setIsLoading(false); }
            };

            const toggleFavorite = async (id, current) => {
                await db.collection("users").doc(user.uid).collection("dictionary").doc(id).update({ favorite: !current });
            };

            // Amélioration Claude 6 : Export
            const exportData = () => {
                const blob = new Blob([JSON.stringify(words, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `DiCO-Ai-Export.json`;
                a.click();
                addToast("Lexique exporté en JSON", "success");
            };

            if (!isAuthReady) return null;

            if (!user) return (
                <div className="flex-1 flex flex-col items-center justify-center p-8 bg-slate-50 font-light overflow-hidden">
                    <div className="toast-container">{toasts.map(t => <Toast key={t.id} msg={t} remove={() => removeToast(t.id)} />)}</div>
                    <div className="w-full max-w-sm space-y-12 animate-in fade-in duration-1000">
                        <div className="text-center space-y-6">
                            {/* Animation sur l'écran de connexion */}
                            <div className="mx-auto p-5 bg-sky-500 rounded-[2.5rem] shadow-2xl text-white shadow-sky-100 flex items-center justify-center overflow-hidden" style={{ width: '100px', height: '100px' }}>
                                <DicoLogo animated={true} size="60px" color="white" />
                            </div>
                            <h1 className="text-5xl font-light tracking-tighter text-sky-600">DiCO Ai</h1>
                            <p className="text-slate-400 font-light tracking-tight opacity-70 leading-tight">L'élégance de l'intelligence<br/>au service de votre lexique.</p>
                        </div>

                        <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100 space-y-6">
                            {authMode === 'welcome' ? (
                                <div className="space-y-4">
                                    <button onClick={() => { const p = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(p).catch(()=>addToast("Config Firebase manquante.", "error")); }} 
                                            className="w-full flex items-center justify-center gap-3 py-4 border border-slate-100 rounded-2xl text-slate-600 hover:bg-slate-50 transition-all btn-press font-light tracking-tight">
                                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" />
                                        <span>Continuer avec Google</span>
                                    </button>
                                    <button onClick={() => setAuthMode('login')} className="w-full py-4 bg-sky-500 text-white rounded-2xl shadow-lg shadow-sky-50 btn-press uppercase tracking-widest text-[10px]">Utiliser un email</button>
                                </div>
                            ) : (
                                <div className="space-y-4 animate-in slide-in-from-bottom-4 duration-500">
                                    <input type="email" placeholder="Email" className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-sky-200 transition-all font-light" value={email} onChange={e=>setEmail(e.target.value)} />
                                    <input type="password" placeholder="Mot de passe" className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-sky-200 transition-all font-light" value={pass} onChange={e=>setPass(e.target.value)} />
                                    <button onClick={() => {
                                        if (authMode === 'login') auth.signInWithEmailAndPassword(email, pass).catch(()=>addToast("Identifiants incorrects.", "error"));
                                        else auth.createUserWithEmailAndPassword(email, pass).catch(()=>addToast("Erreur lors de l'inscription.", "error"));
                                    }} className="w-full py-4 bg-sky-500 text-white rounded-2xl shadow-lg shadow-sky-50 btn-press uppercase tracking-widest text-[10px]">
                                        {authMode === 'login' ? 'Se connecter' : "Créer mon compte"}
                                    </button>
                                    <button onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} className="w-full text-xs text-sky-400 hover:underline">
                                        {authMode === 'login' ? "Pas de compte ? S'inscrire" : "Déjà membre ? Se connecter"}
                                    </button>
                                    <button onClick={() => setAuthMode('welcome')} className="w-full text-[10px] text-slate-300 uppercase tracking-widest pt-2">Retour</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className={`flex-1 flex flex-col font-light transition-all duration-700 ${isDrivingMode ? 'bg-sky-950 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    <div className="toast-container">{toasts.map(t => <Toast key={t.id} msg={t} remove={() => removeToast(t.id)} />)}</div>
                    
                    <header className={`p-6 pt-12 rounded-b-[2.5rem] sticky top-0 z-30 backdrop-blur-md border-b shadow-lg transition-colors ${isDrivingMode ? 'bg-sky-900 border-sky-800' : 'bg-sky-500 border-sky-400'}`}>
                        <div className="max-w-md mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3 overflow-hidden">
                                {/* Animation de glissement dans la barre bleue */}
                                <div className="w-10 h-10 flex items-center justify-center">
                                    <DicoLogo animated={true} color="white" size="36px" bgTheme={isDrivingMode ? "#0c4a6e" : "#0ea5e9"} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-light tracking-tighter text-white">DiCO Ai</h1>
                                    {/* Amélioration Claude 7 : Stats */}
                                    <p className="text-[9px] text-white/60 uppercase tracking-widest">{words.length} mots • {words.filter(w=>w.favorite).length} fav.</p>
                                </div>
                            </div>
                            <div className="flex gap-1">
                                <button onClick={exportData} className="p-2 text-white/70 hover:text-white" title="Exporter"><i data-lucide="download" className="w-5"></i></button>
                                <button onClick={() => auth.signOut()} className="p-2 text-white/70 hover:text-rose-200"><i data-lucide="log-out" className="w-5"></i></button>
                                <button onClick={() => setIsDrivingMode(!isDrivingMode)} className={`px-4 py-2 rounded-2xl text-[10px] tracking-widest uppercase transition-all ${isDrivingMode ? 'bg-orange-500 text-white animate-pulse shadow-lg' : 'bg-white/10 text-white border border-white/20'}`}>
                                    {isDrivingMode ? 'CONDUITE' : 'AUTO'}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto w-full p-4 flex-1 space-y-6 pb-44 overflow-x-hidden">
                        {!isDrivingMode && (
                            <div className="flex gap-2 animate-in fade-in">
                                {/* Amélioration Claude 3 : Recherche fonctionnelle */}
                                <div className="relative flex-1">
                                    <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-4"></i>
                                    <input type="text" placeholder="Rechercher..." className="w-full pl-10 pr-4 py-4 bg-white rounded-2xl shadow-sm border border-slate-100 italic focus:ring-1 focus:ring-sky-200 outline-none transition-all font-light" value={search} onChange={e => setSearch(e.target.value)} />
                                </div>
                                {/* Amélioration Claude 4 : Tris */}
                                <select className="bg-white px-3 rounded-2xl border-none shadow-sm text-[10px] font-light uppercase tracking-widest outline-none" value={sortBy} onChange={e => setSortBy(e.target.value)}>
                                    <option value="date">Date</option>
                                    <option value="alpha">A-Z</option>
                                    <option value="fav">⭐</option>
                                </select>
                            </div>
                        )}

                        <div className="space-y-4">
                            {filteredWords.map(w => (
                                /* Amélioration Claude 8 : Cartes expansibles */
                                <div key={w.id} className={`p-6 bg-white rounded-[2.8rem] shadow-sm border border-slate-50 word-card active:scale-[0.98] ${expandedId === w.id ? 'ring-1 ring-sky-100 shadow-md' : ''}`}>
                                    <div className="flex justify-between items-start">
                                        <div className="flex-1" onClick={() => setExpandedId(expandedId === w.id ? null : w.id)}>
                                            <div className="flex items-center gap-2 mb-1">
                                                <h3 className="text-xl tracking-tight text-slate-800 font-light">{w.term}</h3>
                                                <span className="text-[10px] text-sky-400 px-2 py-0.5 bg-sky-50 rounded-full font-light">{w.phonetic}</span>
                                            </div>
                                            <p className="text-xs text-slate-400 italic mb-2 font-light">{w.type}</p>
                                            <p className="text-sm opacity-60 leading-relaxed tracking-tight font-light">{w.definition}</p>
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            {/* Amélioration Claude 5 : Favoris */}
                                            <button onClick={() => toggleFavorite(w.id, w.favorite)} className={w.favorite ? 'text-amber-400' : 'text-slate-200'}><i data-lucide="star" className="w-5 h-5 fill-current"></i></button>
                                            <button onClick={() => db.collection("users").doc(user.uid).collection("dictionary").doc(w.id).delete()} className="text-slate-100 hover:text-red-400 transition-colors"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                        </div>
                                    </div>
                                    {expandedId === w.id && (
                                        <div className="mt-4 pt-4 border-t border-slate-50 space-y-4 animate-in zoom-in-95 duration-300">
                                            <div className="bg-slate-50 p-4 rounded-2xl">
                                                <p className="text-[9px] uppercase tracking-[0.2em] text-slate-400 mb-1 font-light">Exemple</p>
                                                <p className="text-sm italic opacity-80 font-light tracking-tight">"{w.example}"</p>
                                            </div>
                                            <div>
                                                <p className="text-[9px] uppercase tracking-[0.2em] text-slate-400 mb-1 font-light">Origine</p>
                                                <p className="text-xs opacity-50 leading-relaxed font-light tracking-tight">{w.etymology}</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                            {filteredWords.length === 0 && <p className="text-center py-20 text-slate-300 font-light italic">Aucun résultat trouvé.</p>}
                        </div>
                    </main>

                    {!isDrivingMode && (
                        <div className="fixed bottom-0 left-0 right-0 p-8 pt-0 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent pointer-events-none">
                            <div className="max-w-md mx-auto bg-white rounded-[3rem] shadow-2xl p-2 flex items-center gap-2 border border-slate-100 pointer-events-auto">
                                <input type="text" placeholder="Ajouter un mot..." className="flex-1 bg-transparent px-8 py-5 outline-none font-light italic" value={inputValue} onChange={(e) => setInputValue(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleAddWord()} />
                                <button onClick={() => addToast("Bientôt : Dictée vocale.")} className="p-5 rounded-[2rem] transition-all btn-press bg-slate-50 text-slate-300"><i data-lucide="mic" className="w-6"></i></button>
                                <button onClick={() => handleAddWord()} className="bg-sky-500 text-white p-5 rounded-[2rem] shadow-xl hover:bg-sky-600 btn-press min-w-[70px] flex items-center justify-center transition-all">
                                    {isLoading ? <div className="loader-spin"></div> : <i data-lucide="plus" className="w-6 6"></i>}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => lucide && lucide.createIcons(), 1000);
    </script>
</body>
</html>

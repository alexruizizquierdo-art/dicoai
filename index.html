<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DiCO Ai</title>
    
    <!-- Meta tags pour PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DiCO Ai">
    <meta name="theme-color" content="#0ea5e9">
    
    <link rel="manifest" href='data:application/json,{"name":"DiCO Ai","short_name":"DiCOAi","start_url":".","display":"standalone","background_color":"#f8fafc","theme_color":"#0ea5e9","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3429/3429149.png","sizes":"512x512","type":"image/png"}]}'>

    <!-- Librairies Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: #f8fafc; color: #0f172a; margin: 0; padding: 0; min-height: 100vh; font-weight: 200; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .font-light { font-weight: 200; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        
        /* --- ANIMATIONS DU LOGO --- */
        @keyframes logoSlideIn {
            0% { transform: translateX(80vw); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes pageTurnOnce {
            0% { transform: rotateY(0deg); opacity: 1; }
            100% { transform: rotateY(-180deg); opacity: 0; }
        }
        .animate-logo-slide { animation: logoSlideIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-page-turn { transform-origin: left center; animation: pageTurnOnce 1s 1.2s cubic-bezier(0.645, 0.045, 0.355, 1) forwards; backface-visibility: hidden; }
        .book-perspective { perspective: 1000px; position: relative; }

        /* UI Styles */
        .word-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(226, 232, 240, 0.5); }
        .btn-press:active { transform: scale(0.96); opacity: 0.8; }
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { pointer-events: auto; animation: slideDown 0.4s ease forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .loader-spin { border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .image-glow { animation: pulseGlow 2s infinite ease-in-out; }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 5px rgba(14, 165, 233, 0.2); } 50% { box-shadow: 0 0 20px rgba(14, 165, 233, 0.4); } 100% { box-shadow: 0 0 5px rgba(14, 165, 233, 0.2); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "TON_PROJET.firebaseapp.com",
            projectId: "TON_PROJET_ID",
            storageBucket: "TON_PROJET.appspot.com",
            messagingSenderId: "TON_SENDER_ID",
            appId: "TON_APP_ID"
        };
        const apiKey = ""; 

        // Initialisation
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- UTILITAIRES AUDIO ---
        const pcmToWav = (pcmBase64, sampleRate = 24000) => {
            const byteCharacters = atob(pcmBase64);
            const pcmData = new Int16Array(byteCharacters.length / 2);
            for (let i = 0; i < pcmData.length; i++) {
                pcmData[i] = (byteCharacters.charCodeAt(i * 2 + 1) << 8) | byteCharacters.charCodeAt(i * 2);
            }
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
            return new Blob([view], { type: 'audio/wav' });
        };

        // --- COMPOSANTS ---

        const DicoLogo = ({ animated = false, size = "40px", color = "currentColor" }) => (
            <div className={`book-perspective ${animated ? 'animate-logo-slide' : ''}`} style={{ width: size, height: size }}>
                <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full">
                    <path d="M12 20c-3-1.5-7-1.5-10 0V6c3-1.5 7-1.5 10 0 3-1.5 7-1.5 10 0v14c-3-1.5-7-1.5-10 0z" fill={color} fillOpacity="0.1" />
                    <line x1="12" y1="5" x2="12" y2="20" strokeWidth="1.5" opacity="0.8" />
                    {animated && (
                        <g className="animate-page-turn">
                            <path d="M0 0c3.5-1.5 7-1.5 10 0v14c-3-1.5-7-1.5-10 0V0z" transform="translate(12, 5)" fill={color === "white" ? "#0ea5e9" : "white"} fillOpacity="0.95" stroke={color} />
                        </g>
                    )}
                </svg>
            </div>
        );

        const Toast = ({ msg, remove }) => {
            useEffect(() => { const t = setTimeout(remove, 3000); return () => clearTimeout(t); }, []);
            const bgColor = msg.type === 'error' ? 'bg-rose-500' : msg.type === 'info' ? 'bg-sky-600' : 'bg-emerald-500';
            return (
                <div className={`toast flex items-center gap-3 p-4 mb-2 rounded-2xl text-white shadow-xl ${bgColor}`}>
                    <i data-lucide={msg.type === 'error' ? 'alert-circle' : 'check-circle'} className="w-5 h-5"></i>
                    <span className="text-sm font-light">{msg.text}</span>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [words, setWords] = useState([]);
            const [search, setSearch] = useState('');
            const [toasts, setToasts] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [isGeneratingImg, setIsGeneratingImg] = useState(null); 
            const [expandedId, setExpandedId] = useState(null);
            const [quiz, setQuiz] = useState(null);

            const addToast = (text, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, text, type }]);
                if ('vibrate' in navigator) navigator.vibrate(type === 'error' ? 50 : 10);
            };

            const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => { setUser(u); setIsAuthReady(true); });
                return unsub;
            }, []);

            useEffect(() => {
                if (user && firebaseConfig.apiKey !== "TON_API_KEY") {
                    return db.collection("users").doc(user.uid).collection("dictionary")
                        .onSnapshot(snap => {
                            setWords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        });
                }
            }, [user]);

            const filteredWords = useMemo(() => {
                return words
                    .filter(w => w.term.toLowerCase().includes(search.toLowerCase()))
                    .sort((a, b) => a.term.localeCompare(b.term));
            }, [words, search]);

            const fetchGemini = async (prompt, model = "gemini-2.5-flash-preview-09-2025") => {
                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await response.json();
                        return data;
                    } catch (e) {
                        if (i === 4) throw e;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const handleAddEntry = async () => {
                if (!inputValue.trim() || isLoading) return;
                setIsLoading(true);
                try {
                    const prompt = `Analyse l'entrée suivante : "${inputValue}". Réponds UNIQUEMENT au format JSON : {"category": "mot" | "proverbe" | "personnage", "term": "corrigé", "definition": "sens précis", "example": "usage/fait", "details": "origine/dates"}`;
                    const data = await fetchGemini(prompt);
                    const aiResult = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));

                    await db.collection("users").doc(user.uid).collection("dictionary").add({
                        ...aiResult,
                        createdAt: Date.now()
                    });
                    setInputValue('');
                    addToast(`"${aiResult.term}" ajouté.`);
                } catch (e) { addToast("Erreur IA", "error"); }
                finally { setIsLoading(false); }
            };

            const speakGemini = async (text) => {
                if (isSpeaking) return;
                setIsSpeaking(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                            }
                        })
                    });
                    const result = await response.json();
                    const base64Audio = result.candidates[0].content.parts[0].inlineData.data;
                    const blob = pcmToWav(base64Audio);
                    const audio = new Audio(URL.createObjectURL(blob));
                    audio.onended = () => setIsSpeaking(false);
                    audio.play();
                } catch (e) {
                    setIsSpeaking(false);
                    addToast("Erreur voix Gemini", "error");
                }
            };

            const generateImage = async (word) => {
                setIsGeneratingImg(word.id);
                try {
                    const promptText = word.category === 'personnage' 
                        ? `A realistic portrait of ${word.term}, historical accurate style, soft lighting`
                        : `A poetic and symbolic illustration of the proverb "${word.term}", artistic style, digital painting`;
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instances: { prompt: promptText }, parameters: { sampleCount: 1 } })
                    });
                    const result = await response.json();
                    const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    
                    await db.collection("users").doc(user.uid).collection("dictionary").doc(word.id).update({ imageUrl });
                    addToast("Image générée ✨");
                } catch (e) {
                    addToast("Erreur d'image", "error");
                } finally { setIsGeneratingImg(null); }
            };

            const startQuiz = async () => {
                if (words.length < 3) {
                    addToast("Ajoute au moins 3 mots pour un quiz !", "error");
                    return;
                }
                setIsLoading(true);
                try {
                    const listStr = words.slice(0, 5).map(w => w.term).join(', ');
                    const prompt = `Crée une question de quiz basée sur un de ces éléments : ${listStr}. Réponds en JSON : {"question": "...", "choices": ["A", "B", "C"], "correctIndex": 0}`;
                    const data = await fetchGemini(prompt);
                    const quizData = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
                    setQuiz(quizData);
                } catch (e) { addToast("Erreur Quiz", "error"); }
                finally { setIsLoading(false); }
            };

            if (!isAuthReady) return null;

            if (!user) return (
                <div className="flex-1 flex flex-col items-center justify-center p-8 bg-slate-50 font-light overflow-hidden">
                    <div className="text-center space-y-6">
                        <div className="mx-auto p-5 bg-sky-500 rounded-[2.5rem] shadow-2xl flex items-center justify-center overflow-hidden" style={{ width: '100px', height: '100px' }}>
                            <DicoLogo animated={true} size="60px" color="white" />
                        </div>
                        <h1 className="text-5xl font-light text-sky-600 tracking-tighter">DiCO Ai</h1>
                        <p className="text-slate-400 max-w-[200px] mx-auto text-sm leading-tight">L'intelligence au service de votre culture.</p>
                        <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full bg-white border p-4 rounded-2xl flex items-center justify-center gap-3 shadow-sm btn-press">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5" />
                            Continuer avec Google
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="flex-1 flex flex-col bg-slate-50">
                    <div className="toast-container">{toasts.map(t => <Toast key={t.id} msg={t} remove={() => removeToast(t.id)} />)}</div>
                    
                    <header className="p-6 pt-12 bg-sky-500 rounded-b-[2.5rem] sticky top-0 z-30 shadow-lg flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <DicoLogo animated={true} color="white" size="36px" />
                            <h1 className="text-2xl font-light text-white tracking-tight">DiCO Ai</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={startQuiz} className="bg-white/20 p-2 rounded-xl text-white hover:bg-white/30 transition-all btn-press">
                                <i data-lucide="brain" className="w-5"></i>
                            </button>
                            <button onClick={() => auth.signOut()} className="text-white/70 p-2"><i data-lucide="log-out" className="w-5"></i></button>
                        </div>
                    </header>

                    {quiz && (
                        <div className="m-4 p-6 bg-amber-50 border border-amber-200 rounded-[2rem] animate-in zoom-in-95 duration-300">
                            <div className="flex justify-between items-start mb-4">
                                <h4 className="text-amber-800 font-medium">Quiz ✨</h4>
                                <button onClick={() => setQuiz(null)}><i data-lucide="x" className="w-4 text-amber-400"></i></button>
                            </div>
                            <p className="text-amber-900 mb-4">{quiz.question}</p>
                            <div className="space-y-2">
                                {quiz.choices.map((c, i) => (
                                    <button key={i} onClick={() => {
                                        if (i === quiz.correctIndex) {
                                            addToast("Correct ! ✨", "success");
                                            setQuiz(null);
                                        } else addToast("Essaie encore !", "error");
                                    }} className="w-full text-left p-3 bg-white border border-amber-100 rounded-xl text-sm hover:bg-amber-100 transition-all">
                                        {c}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    <main className="p-4 flex-1 space-y-4 pb-44">
                        <div className="relative">
                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-4"></i>
                            <input type="text" placeholder="Mots, proverbes, personnages..." className="w-full pl-10 p-4 bg-white rounded-2xl shadow-sm border-none outline-none font-light italic" value={search} onChange={e => setSearch(e.target.value)} />
                        </div>

                        <div className="space-y-4">
                            {filteredWords.map(w => (
                                <div key={w.id} className={`p-6 bg-white rounded-[2.5rem] shadow-sm word-card active:scale-[0.98] ${expandedId === w.id ? 'ring-1 ring-sky-100' : ''}`} onClick={() => setExpandedId(expandedId === w.id ? null : w.id)}>
                                    <div className="flex justify-between items-start mb-2">
                                        <span className={`text-[9px] uppercase tracking-widest px-3 py-1 rounded-full ${
                                            w.category === 'proverbe' ? 'bg-emerald-50 text-emerald-600' : 
                                            w.category === 'personnage' ? 'bg-purple-50 text-purple-600' : 
                                            'bg-sky-50 text-sky-600'
                                        }`}>
                                            {w.category}
                                        </span>
                                        <div className="flex gap-2">
                                            <button onClick={(e) => { e.stopPropagation(); speakGemini(`${w.term}. ${w.definition}`); }} className={`${isSpeaking ? 'text-amber-500 animate-pulse' : 'text-sky-300'} hover:text-sky-500 transition-colors`}>
                                                <i data-lucide="volume-2" className="w-5"></i>
                                            </button>
                                            <button onClick={(e) => { e.stopPropagation(); db.collection("users").doc(user.uid).collection("dictionary").doc(w.id).delete(); }} className="text-slate-100 hover:text-red-400"><i data-lucide="trash-2" className="w-4"></i></button>
                                        </div>
                                    </div>
                                    <h3 className="text-2xl font-light text-slate-800 capitalize mb-1">{w.term}</h3>
                                    <p className="text-sm opacity-60 font-light leading-relaxed mb-2">{w.definition}</p>
                                    
                                    {expandedId === w.id && (
                                        <div className="mt-4 pt-4 border-t border-slate-50 space-y-4 animate-in fade-in">
                                            {w.imageUrl ? (
                                                <img src={w.imageUrl} className="w-full aspect-square object-cover rounded-3xl shadow-lg" alt={w.term} />
                                            ) : (
                                                <button 
                                                    onClick={(e) => { e.stopPropagation(); generateImage(w); }} 
                                                    disabled={isGeneratingImg === w.id}
                                                    className="w-full p-4 bg-sky-50 border border-sky-100 rounded-3xl text-sky-600 text-xs flex items-center justify-center gap-2 hover:bg-sky-100 transition-all"
                                                >
                                                    {isGeneratingImg === w.id ? <div className="loader-spin"></div> : <><i data-lucide="sparkles" className="w-4"></i> Illustrer avec l'IA ✨</>}
                                                </button>
                                            )}

                                            <div className="bg-slate-50 p-4 rounded-2xl">
                                                <p className="text-xs italic opacity-80">
                                                    <strong>{w.category === 'personnage' ? 'Fait marquant : ' : 'Exemple : '}</strong>
                                                    "{w.example}"
                                                </p>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <p className="text-[10px] text-slate-300 uppercase tracking-tighter">
                                                    {w.category === 'personnage' ? 'Époque : ' : 'Origine : '} {w.details}
                                                </p>
                                                <button onClick={(e) => { e.stopPropagation(); speakGemini(`${w.term}. ${w.definition}. ${w.example}`); }} className="text-[10px] text-sky-400 flex items-center gap-1">
                                                    Lire la bio complète ✨
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-slate-50 to-transparent">
                        <div className="max-w-md mx-auto bg-white rounded-[3rem] shadow-2xl p-2 flex items-center gap-2 border">
                            <input type="text" placeholder="Un mot, un proverbe, un nom..." className="flex-1 px-6 py-4 outline-none font-light italic" value={inputValue} onChange={e => setInputValue(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleAddEntry()} />
                            <button onClick={handleAddEntry} className="bg-sky-500 text-white p-5 rounded-[2rem] shadow-xl min-w-[70px] flex items-center justify-center btn-press">
                                {isLoading ? <div className="loader-spin"></div> : <i data-lucide="plus"></i>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => { if (window.lucide) lucide.createIcons(); }, 1000);
    </script>
</body>
</html>

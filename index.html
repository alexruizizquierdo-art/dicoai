<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICO AI - Lexique Intelligent</title>
    <!-- Bibliothèques de base -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (Version Compat pour exécution directe en HTML) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            font-weight: 200;
            -webkit-tap-highlight-color: transparent;
        }
        .font-light { font-weight: 200; }
        .tracking-tighter { letter-spacing: -0.05em; }
        .word-card { transition: all 0.3s ease; }
        /* Style pour l'ascenseur */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURATION FIREBASE ---
        // Alex : Remplis IMPÉRATIVEMENT ces valeurs pour que le bouton Google fonctionne.
        const firebaseConfig = {
            apiKey: "VOTRE_API_KEY",
            authDomain: "VOTRE_PROJECT.firebaseapp.com",
            projectId: "VOTRE_PROJECT_ID",
            storageBucket: "VOTRE_PROJECT.appspot.com",
            messagingSenderId: "VOTRE_SENDER_ID",
            appId: "VOTRE_APP_ID"
        };

        // Initialisation sécurisée
        let auth, db;
        try {
            if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "VOTRE_API_KEY") {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                auth = firebase.auth();
                db = firebase.firestore();
            }
        } catch (e) {
            console.error("Erreur d'initialisation Firebase", e);
        }

        // --- COMPOSANTS ---

        const DicoLogo = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" style={{ width: '100%', height: '100%' }}>
                <path d="M2 6c0-2 2-3 4-3s4 1 6 3c2-2 4-3 6-3s4 1 4 3v12c0 2-2 3-4 3s-4-1-6-3c-2 2-4 3-6 3s-4-1-4-3V6z" />
                <path d="M12 6v12" />
                <path d="M6 8h2" opacity="0.3" />
                <path d="M16 8h2" opacity="0.3" />
            </svg>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [authMode, setAuthMode] = useState('login');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isDrivingMode, setIsDrivingMode] = useState(false);
            const [words, setWords] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);

            // Listener de connexion
            useEffect(() => {
                if (!auth) return;
                const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribe();
            }, []);

            // Synchronisation Firestore
            useEffect(() => {
                if (!user || !db) return;
                const unsubscribe = db.collection("users").doc(user.uid).collection("dictionary")
                    .orderBy("createdAt", "desc")
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setWords(data);
                    }, (err) => {
                        setError("Erreur de synchronisation Cloud.");
                    });
                return () => unsubscribe();
            }, [user]);

            // Actions d'authentification
            const handleGoogleAuth = async () => {
                setError(null);
                if (!auth) {
                    setError("Veuillez d'abord configurer vos clés Firebase dans le code.");
                    return;
                }
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    // Utilisation de signInWithPopup pour la simplicité, signInWithRedirect est plus robuste sur mobile
                    await auth.signInWithPopup(provider);
                } catch (err) {
                    console.error(err);
                    if (err.code === 'auth/popup-blocked') {
                        setError("Le navigateur a bloqué la fenêtre de connexion. Autorisez les pop-ups.");
                    } else {
                        setError("La connexion Google a échoué. Vérifiez votre configuration Firebase.");
                    }
                }
            };

            const handleEmailAuth = async (e) => {
                e.preventDefault();
                setError(null);
                if (!auth) return setError("Configuration Firebase manquante.");
                setIsLoading(true);
                try {
                    if (authMode === 'login') {
                        await auth.signInWithEmailAndPassword(email, password);
                    } else {
                        await auth.createUserWithEmailAndPassword(email, password);
                    }
                } catch (err) {
                    setError("Identifiants incorrects ou erreur réseau.");
                } finally {
                    setIsLoading(false);
                }
            };

            const addWord = async () => {
                if (!inputValue.trim() || !user || !db) return;
                setIsLoading(true);
                try {
                    await db.collection("users").doc(user.uid).collection("dictionary").add({
                        term: inputValue,
                        definition: "Analyse intelligente en cours...",
                        createdAt: Date.now()
                    });
                    setInputValue('');
                } catch (e) {
                    setError("Erreur lors de l'ajout du mot.");
                } finally {
                    setIsLoading(false);
                }
            };

            const deleteWord = async (id) => {
                try {
                    await db.collection("users").doc(user.uid).collection("dictionary").doc(id).delete();
                } catch (e) {
                    setError("Erreur lors de la suppression.");
                }
            };

            // Notification d'erreur globale
            const ErrorBanner = () => error ? (
                <div className="fixed top-6 left-6 right-6 bg-red-500 text-white p-4 rounded-2xl shadow-2xl z-[100] flex justify-between items-center text-xs animate-in slide-in-from-top duration-300">
                    <div className="flex items-center gap-2">
                        <i data-lucide="alert-circle" style={{width:'16px'}}></i>
                        <span className="font-light">{error}</span>
                    </div>
                    <button onClick={() => setError(null)} className="p-1 hover:bg-white/20 rounded-lg">
                        <i data-lucide="x" style={{width:'14px'}}></i>
                    </button>
                </div>
            ) : null;

            // --- VUE LOGIN ---
            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 font-light">
                        <ErrorBanner />
                        <div className="max-w-sm w-full space-y-12 animate-in fade-in duration-1000">
                            <div className="text-center space-y-6">
                                <div className="w-24 h-24 mx-auto p-4 bg-sky-500 rounded-[2rem] shadow-2xl text-white transition-transform hover:rotate-3">
                                    <DicoLogo />
                                </div>
                                <div className="space-y-2">
                                    <h1 className="text-5xl font-light italic tracking-tighter text-sky-600 uppercase">DICO AI</h1>
                                    <p className="text-slate-400 italic opacity-70">Votre lexique personnel intelligent.</p>
                                </div>
                            </div>

                            <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100 space-y-6">
                                <h2 className="text-xl font-light italic text-center text-slate-600 uppercase tracking-widest">
                                    {authMode === 'login' ? "Connexion" : "Inscription"}
                                </h2>

                                <button 
                                    onClick={handleGoogleAuth}
                                    className="w-full flex items-center justify-center gap-3 py-4 border border-slate-100 rounded-2xl text-slate-600 hover:bg-slate-50 transition-all shadow-sm active:scale-95"
                                >
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" />
                                    <span className="font-light">Continuer avec Google</span>
                                </button>

                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t border-slate-50"></div>
                                    <span className="flex-shrink mx-4 text-[10px] text-slate-200 uppercase tracking-widest">Ou par email</span>
                                    <div className="flex-grow border-t border-slate-50"></div>
                                </div>
                                
                                <form onSubmit={handleEmailAuth} className="space-y-4">
                                    <input type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)}
                                        className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none italic border border-transparent focus:border-sky-200 transition-all font-light" required />
                                    <input type="password" placeholder="Mot de passe" value={password} onChange={(e) => setPassword(e.target.value)}
                                        className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none italic border border-transparent focus:border-sky-200 transition-all font-light" required />
                                    <button type="submit" disabled={isLoading} className="w-full bg-sky-500 text-white py-4 rounded-2xl shadow-lg shadow-sky-100 hover:bg-sky-600 transition-all uppercase tracking-widest text-sm font-light">
                                        {isLoading ? "Chargement..." : (authMode === 'login' ? 'Se connecter' : "Créer mon compte")}
                                    </button>
                                </form>
                            </div>

                            <div className="text-center space-y-4">
                                <p className="text-sm text-slate-400 italic">
                                    {authMode === 'login' ? "Pas encore de compte ?" : "Déjà membre ?"}
                                </p>
                                <button 
                                    onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} 
                                    className="w-full py-3 rounded-2xl border border-sky-100 text-sky-600 tracking-tight hover:bg-sky-50 transition-all font-light"
                                >
                                    {authMode === 'login' ? "Créer un compte maintenant" : "Retourner à la connexion"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- VUE APPLICATION ---
            return (
                <div className={`min-h-screen pb-32 transition-all duration-700 font-light ${isDrivingMode ? 'bg-sky-950 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    <ErrorBanner />
                    <header className={`${isDrivingMode ? 'bg-sky-900/80 border-b border-sky-800' : 'bg-white shadow-sm'} p-6 rounded-b-[3rem] sticky top-0 z-30 backdrop-blur-md transition-colors`}>
                        <div className="max-w-md mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 p-2 rounded-2xl bg-sky-500 text-white shadow-xl flex items-center justify-center">
                                    <DicoLogo />
                                </div>
                                <h1 className="text-3xl font-light tracking-tighter italic uppercase text-sky-600 leading-none">DICO AI</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => auth.signOut()} className="p-3 text-slate-300 hover:text-red-400 transition-colors">
                                    <i data-lucide="log-out" style={{width:'20px'}}></i>
                                </button>
                                <button 
                                    onClick={() => setIsDrivingMode(!isDrivingMode)}
                                    className={`px-4 py-2 rounded-2xl text-[10px] tracking-widest uppercase transition-all ${isDrivingMode ? 'bg-orange-500 text-white shadow-lg animate-pulse' : 'bg-slate-100 text-slate-500 font-light'}`}
                                >
                                    {isDrivingMode ? 'ON' : 'MODE AUTO'}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-6 mt-4">
                        <div className="relative">
                            <i data-lucide="search" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 w-4"></i>
                            <input type="text" placeholder="Rechercher..." className="w-full pl-12 pr-6 py-5 bg-white rounded-[2.5rem] shadow-sm border border-slate-100 italic outline-none focus:ring-1 focus:ring-sky-200 transition-all font-light" />
                        </div>

                        <div className="space-y-4">
                            {words.map(word => (
                                <div key={word.id} className="p-6 bg-white rounded-[2rem] shadow-sm border border-slate-50 flex justify-between items-start word-card">
                                    <div className="flex-1">
                                        <h3 className="text-2xl font-light italic tracking-tight mb-2 text-slate-800">{word.term}</h3>
                                        <p className="text-sm font-light opacity-60 leading-relaxed">{word.definition}</p>
                                    </div>
                                    <button onClick={() => deleteWord(word.id)} className="text-slate-200 hover:text-red-400 p-2 transition-colors">
                                        <i data-lucide="trash-2" style={{width:'18px'}}></i>
                                    </button>
                                </div>
                            ))}
                            {words.length === 0 && (
                                <div className="py-20 text-center opacity-30 italic font-light">Votre dictionnaire est vide.</div>
                            )}
                        </div>
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-slate-50 to-transparent pointer-events-none">
                        <div className="max-w-md mx-auto bg-white rounded-[3rem] shadow-2xl p-2 flex items-center gap-2 border border-slate-100 pointer-events-auto">
                            <input 
                                type="text" 
                                placeholder="Nouveau mot..." 
                                className="flex-1 bg-transparent px-8 py-5 outline-none italic font-light"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && addWord()}
                            />
                            <button onClick={addWord} disabled={isLoading} className="bg-sky-500 text-white p-5 rounded-[2rem] shadow-xl hover:bg-sky-600 transition-all active:scale-95 disabled:opacity-50">
                                {isLoading ? <div className="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <i data-lucide="plus"></i>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialisation périodique des icônes
        setInterval(() => lucide.createIcons(), 500);
    </script>
</body>
</html>

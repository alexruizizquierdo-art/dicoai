<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DiCo Ai Pro ✨</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DiCo Ai">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/blue-book.png">

    <!-- Bibliothèques Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compat mode pour GitHub Pages) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- Icônes FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif !important; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; overflow-x: hidden; }
        #root { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* --- MOTEUR 3D ÉLITE CADENASSÉ --- */
        @keyframes butterflyOpenAction { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(-180deg); } }
        @keyframes butterflyPageAction { 0% { transform: rotateY(0deg); opacity: 0; } 3% { opacity: 1; } 100% { transform: rotateY(-170deg); opacity: 1; } }
        @keyframes signatureRevealAction { 0%, 65% { opacity: 0; transform: translateY(4px); } 100% { opacity: 1; transform: translateY(0); } }

        .book-viewport { position: relative; transform-style: preserve-3d; perspective: 2500px; display: flex; align-items: center; justify-content: center; }
        .alex-frame-box { background-color: #0ea5e9; border-radius: 24%; display: flex; align-items: center; justify-content: center; box-shadow: 0 45px 90px -15px rgba(14, 165, 233, 0.45); position: relative; transform-style: preserve-3d; transition: all 0.4s ease; }
        .is-listening-logo { animation: listeningPulse 1.2s infinite !important; background-color: #f43f5e !important; box-shadow: 0 25px 50px -12px rgba(244, 63, 94, 0.5) !important; }
        @keyframes listeningPulse { 0% { transform: scale(1); } 70% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .book-model { position: relative; transform-style: preserve-3d; width: 44%; height: 64%; transform: translateX(22%); transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .book-right-page { position: absolute; inset: 0; background: #fffdfa !important; background-image: linear-gradient(to right, #f2ece4 0%, #fffdfa 12%, #fffdfa 100%); border-radius: 0 6px 6px 0; border: 1px solid #e2e8f0; z-index: 5; display: flex; align-items: center; justify-content: center; box-shadow: 15px 15px 40px rgba(0,0,0,0.1); transform-style: preserve-3d; }
        .book-cover-leaf { position: absolute; inset: 0; transform-origin: left center; z-index: 50; transform-style: preserve-3d; backface-visibility: visible; }
        .cover-front { position: absolute; inset: 0; background: #fffdfa !important; border: 2px solid #0ea5e9; border-radius: 0 6px 6px 0; backface-visibility: hidden; z-index: 2; }
        .cover-back { position: absolute; inset: 0; background: #fffdfa !important; background-image: linear-gradient(to left, #f2ece4 0%, #fffdfa 15%, #fffdfa 100%); transform: rotateY(180deg); backface-visibility: hidden; border: 1px solid #e2e8f0; border-radius: 6px 0 0 6px; z-index: 1; }
        .book-turning-leaf { position: absolute; inset: 1px; background: #fffdfa !important; background-image: linear-gradient(to right, #f2ece4 0%, #fffdfa 18%, #fffdfa 100%); border-radius: 0 6px 6px 0; border: 1px solid #f1f5f9; transform-origin: left center; z-index: 40; opacity: 0; backface-visibility: hidden; }
        .book-spine-line { position: absolute; left: -1px; top: 0; bottom: 0; width: 4px; background: rgba(0,0,0,0.15); z-index: 100; }

        .anim-open { animation: butterflyOpenAction 2.2s 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .anim-page { animation: butterflyPageAction 2.6s 1s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .signature-reveal { animation: signatureRevealAction 3.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }

        /* UI APP */
        .card-premium { background: white; border-radius: 3rem; border: 1px solid #f1f5f9; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04); transition: all 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-ai-pill { font-size: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em; padding: 10px 16px; border-radius: 9999px; transition: all 0.2s ease; display: flex; align-items: center; gap: 6px; border: 1px solid transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- CONFIGURATION FIREBASE ALEX (HARDCODÉE POUR GITHUB) ---
        const firebaseConfig = { 
            apiKey: "AIzaSyDS-n8NcoNTJ21FUb_MdOaPnX75EW2KIh8",
            authDomain: "dico-ai.firebaseapp.com",
            projectId: "dico-ai",
            storageBucket: "dico-ai.firebasestorage.app",
            messagingSenderId: "1083255726513",
            appId: "1:1083255726513:web:21d2af14a9efd449b0dd90"
        };
        
        // Clé API Gemini (Alex, remplace par la tienne si tu en as une, sinon utilise le service proxy)
        const GEMINI_API_KEY = ""; 
        const APP_ID_PATH = "dico-ai-pro-final";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const ALL_LANGUAGES = [
            { id: 'en', name: 'Anglais' }, { id: 'es', name: 'Espagnol' }, { id: 'de', name: 'Allemand' },
            { id: 'it', name: 'Italien' }, { id: 'pt', name: 'Portugais' }, { id: 'nl', name: 'Néerlandais' },
            { id: 'ru', name: 'Russe' }, { id: 'ja', name: 'Japonais' }, { id: 'zh', name: 'Chinois' },
            { id: 'ko', name: 'Coréen' }, { id: 'ar', name: 'Arabe' }, { id: 'hi', name: 'Hindi' },
            { id: 'tr', name: 'Turc' }, { id: 'pl', name: 'Polonais' }, { id: 'sv', name: 'Suédois' }
        ];

        const pcmToWav = (pcmData, sampleRate) => {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeStr(0, 'RIFF'); view.setUint32(4, 36 + pcmData.length, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data');
            view.setUint32(40, pcmData.length, true);
            for (let i = 0; i < pcmData.length; i++) view.setUint8(44 + i, pcmData[i]);
            return new Blob([buffer], { type: 'audio/wav' });
        };

        const DicoLogo = ({ size = 90, animated = true, listening = false }) => {
            return (
                <div className="book-viewport" style={{ width: size, height: size }}>
                    <div className={`alex-frame-box w-full h-full ${listening ? 'is-listening-logo' : ''}`}>
                        <div className="book-model">
                            <div className="book-spine-line" />
                            <div className="book-right-page">
                                <div className={animated ? "signature-reveal flex flex-col items-end pointer-events-none" : "flex flex-col items-end pointer-events-none"} style={{ transform: 'translateX(-4px)' }}>
                                    <span style={{ color: '#0ea5e9', fontSize: size * 0.12, fontWeight: '300', fontStyle: 'normal', whiteSpace: 'nowrap', lineHeight: '1' }}>DiCo Ai</span>
                                    <span style={{ color: '#1a1a1a', fontSize: size * 0.055, fontWeight: '700', fontStyle: 'italic', marginTop: '0.1em', marginRight: '0.55em' }}>Pro</span>
                                </div>
                            </div>
                            <div className={`book-turning-leaf ${animated ? 'anim-page' : ''}`} style={!animated ? { transform: 'rotateY(-165deg)', opacity: 1 } : {}} />
                            <div className={`book-cover-leaf ${animated ? 'anim-open' : ''}`} style={!animated ? { transform: 'rotateY(-180deg)' } : {}}>
                                <div className="cover-front" />
                                <div className="cover-back" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [words, setWords] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [activeCategoryTab, setActiveCategoryTab] = useState('all');
            const [selectedLangs, setSelectedLangs] = useState(['en']);
            const [langMenuOpen, setLangMenuOpen] = useState(false);
            const [loading, setLoading] = useState(false);
            const [isVoiceMode, setIsVoiceMode] = useState(false);
            const [isTrulyListening, setIsTrulyListening] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            
            const recognitionRef = useRef(null);

            useEffect(() => {
                const initAuth = async () => { try { await auth.signInAnonymously(); } catch(e) { console.error("Auth fail", e); } };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (user) {
                    const q = db.collection('artifacts').doc(APP_ID_PATH).collection('users').doc(user.uid).collection('dictionary');
                    return q.onSnapshot(snap => setWords(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                }
            }, [user]);

            const availableLangs = useMemo(() => {
                const langs = new Set(words.map(w => w.sourceLang || 'Français'));
                return ['all', ...Array.from(langs)];
            }, [words]);

            const callGemini = async (prompt, system = "Expert IA.") => {
                if (!GEMINI_API_KEY) { 
                    console.warn("Pas de clé API Gemini. Utilisation d'un bouchon.");
                    return JSON.stringify({action:"ask", answer:"Veuillez configurer votre clé API Gemini dans le code pour activer l'intelligence."});
                }
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: system }] } })
                });
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            };

            const playTTS = async (text) => {
                if (isSpeaking) return;
                setIsSpeaking(true);
                setIsTrulyListening(false);
                try {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'fr-FR';
                    utterance.onend = () => { setIsSpeaking(false); if (isVoiceMode) startListening(); };
                    window.speechSynthesis.speak(utterance);
                } catch (e) { setIsSpeaking(false); }
            };

            const startListening = () => {
                const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!Rec || isSpeaking || !isVoiceMode) return;
                const rec = new Rec();
                rec.lang = 'fr-FR';
                rec.onstart = () => setIsTrulyListening(true);
                rec.onresult = (e) => handleVoiceEngine(e.results[0][0].transcript);
                rec.onend = () => { setIsTrulyListening(false); if (isVoiceMode && !isSpeaking && !loading) setTimeout(startListening, 600); };
                recognitionRef.current = rec;
                try { rec.start(); } catch(e) { setIsTrulyListening(false); }
            };

            const handleVoiceEngine = async (text) => {
                setLoading(true);
                const targets = selectedLangs.join(', ');
                const sys = `Nouveau mot: JSON {"action":"new", "data":{"category":"mot","term":"..","definition":"..","sourceLang":"Français","translations":[]}}. Sinon question: {"action":"ask", "answer":".."}.`;
                try {
                    const resText = await callGemini(text, sys);
                    const res = JSON.parse(resText.match(/\{[\s\S]*\}/)[0]);
                    if (res.action === "new") {
                        await db.collection('artifacts').doc(APP_ID_PATH).collection('users').doc(user.uid).collection('dictionary').add({ ...res.data, createdAt: Date.now() });
                        playTTS(`${res.data.term}. ${res.data.definition}.`);
                    } else { playTTS(res.answer); }
                } catch (e) { playTTS("Je n'ai pas compris."); } finally { setLoading(false); }
            };

            const handleManualAdd = async () => {
                if (!inputValue.trim() || loading) return;
                setLoading(true);
                try {
                    const resText = await callGemini(inputValue, "Réponds en JSON: {\"category\":\"mot\",\"term\":\"corrigé\",\"definition\":\"explication\",\"sourceLang\":\"Français\"}");
                    const result = JSON.parse(resText.match(/\{[\s\S]*\}/)[0]);
                    await db.collection('artifacts').doc(APP_ID_PATH).collection('users').doc(user.uid).collection('dictionary').add({ ...result, createdAt: Date.now() });
                    setInputValue('');
                } catch(e) { console.error(e); } finally { setLoading(false); }
            };

            if (!user) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white p-6 text-center">
                    <div className="mb-16"><DicoLogo size={320} animated={true} listening={false} /></div>
                    <button onClick={() => auth.signInAnonymously()} className="w-full max-w-[300px] bg-sky-500 text-white py-5 rounded-[3rem] shadow-xl font-bold uppercase tracking-[0.5em] active:scale-95 transition-all text-[10px] flex items-center justify-center gap-3">
                        <i className="fa-solid fa-play"></i> Démarrer
                    </button>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#fdfdfd] flex flex-col overflow-hidden pb-44">
                    <header className="p-6 pt-10 flex flex-col items-center border-b border-slate-50 gap-2 relative z-30">
                        <DicoLogo size={140} animated={false} listening={isTrulyListening} />
                        <div className="absolute right-6 top-10">
                            <button onClick={() => auth.signOut()} className="text-slate-200 hover:text-rose-400 transition-colors"><i className="fa-solid fa-right-from-bracket text-xl"></i></button>
                        </div>
                    </header>

                    <div className="bg-white border-b border-slate-50 p-6 space-y-4">
                        <div className="flex gap-3 justify-center">
                            {['all', 'mot', 'proverbe'].map(cat => (
                                <button key={cat} onClick={() => setActiveCategoryTab(cat)} className={`px-4 py-1.5 rounded-full text-[9px] uppercase font-bold tracking-widest transition-all ${activeCategoryTab === cat ? 'text-sky-600 border-b-2 border-sky-600' : 'text-slate-300'}`}>{cat === 'all' ? 'Tous' : cat + 's'}</button>
                            ))}
                        </div>
                        <div className="relative mt-2">
                            <i className="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-200"></i>
                            <input type="text" placeholder="Rechercher..." className="w-full pl-12 pr-6 py-4 bg-slate-50 rounded-full border-none outline-none text-sm italic text-slate-600" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                        </div>
                    </div>

                    <main className="flex-1 p-6 space-y-10 overflow-y-auto no-scrollbar">
                        <div className="space-y-12 max-w-xl mx-auto">
                            {words.filter(w => (activeCategoryTab === 'all' || w.category === activeCategoryTab) && (w.term || "").toLowerCase().includes(searchQuery.toLowerCase())).sort((a,b) => b.createdAt - a.createdAt).map(w => (
                                <div key={w.id} className="p-10 card-premium animate-in fade-in">
                                    <div className="flex justify-between items-start mb-6">
                                        <div className="flex items-center gap-4">
                                            <span className="text-[10px] uppercase tracking-[0.3em] text-sky-500 font-bold bg-sky-50 px-4 py-1.5 rounded-full">{w.category}</span>
                                            <button onClick={() => playTTS(`${w.term}. ${w.definition}`)} className="text-sky-200 hover:text-sky-500"><i className="fa-solid fa-volume-high text-lg"></i></button>
                                        </div>
                                        <button onClick={() => db.collection('artifacts').doc(APP_ID_PATH).collection('users').doc(user.uid).collection('dictionary').doc(w.id).delete()} className="text-slate-100 hover:text-rose-400"><i className="fa-solid fa-trash-can"></i></button>
                                    </div>
                                    <h3 className="text-4xl font-light italic tracking-tight capitalize mb-4 text-slate-800">{w.term} <span className="text-[10px] text-slate-300 ml-2">({w.sourceLang})</span></h3>
                                    <p className="text-lg text-slate-500 leading-relaxed font-light mb-10 opacity-75">{w.definition}</p>
                                </div>
                            ))}
                        </div>
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-white via-white/95 to-transparent z-50">
                        <div className="max-w-md mx-auto">
                            <div className="bg-white rounded-[4rem] shadow-2xl p-3 flex items-center gap-3 border border-slate-100">
                                <button onClick={() => setLangMenuOpen(true)} className="p-4 text-slate-400 hover:text-sky-500 transition-all"><i className="fa-solid fa-earth-europe text-xl"></i></button>
                                <button onClick={() => { const next = !isVoiceMode; setIsVoiceMode(next); if (next) playTTS("Je t'écoute."); else setIsTrulyListening(false); }} className={`p-4 rounded-full transition-all ${isVoiceMode ? (isTrulyListening ? 'is-listening-logo shadow-lg text-white' : 'bg-slate-900 text-white shadow-lg') : 'text-slate-400 hover:text-sky-500'}`}>
                                    <i className={`fa-solid ${isVoiceMode ? (isTrulyListening ? 'fa-volume-high' : 'fa-car') : 'fa-microphone'} text-xl`}></i>
                                </button>
                                <input type="text" placeholder="Indexer..." className="flex-1 bg-transparent px-2 py-5 outline-none font-light italic text-slate-700" value={inputValue} onChange={e => setInputValue(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleManualAdd()} />
                                <button onClick={handleManualAdd} disabled={loading} className="bg-sky-500 text-white p-5 rounded-full shadow-xl">
                                    {loading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-plus text-xl"></i>}
                                </button>
                            </div>
                        </div>
                    </div>

                    {langMenuOpen && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-900/10 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xs rounded-[3rem] shadow-2xl p-10">
                                <h4 className="text-[11px] uppercase font-bold text-slate-400 mb-8 text-center tracking-widest">Langues</h4>
                                <div className="max-h-60 overflow-y-auto no-scrollbar space-y-2 mb-6">
                                    {ALL_LANGUAGES.map(l => (
                                        <button key={l.id} onClick={() => setSelectedLangs([l.id])} className={`w-full text-left p-4 rounded-2xl text-xs flex justify-between border ${selectedLangs.includes(l.id) ? 'bg-sky-50 text-sky-600 font-bold border-sky-100' : 'text-slate-400 border-transparent hover:bg-slate-50'}`}> {l.name} {selectedLangs.includes(l.id) && <i className="fa-solid fa-check"></i>}</button>
                                    ))}
                                </div>
                                <button onClick={() => setLangMenuOpen(false)} className="w-full mt-2 py-5 bg-slate-900 text-white rounded-[2rem] text-[10px] font-bold uppercase tracking-widest shadow-xl">Confirmer</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

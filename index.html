<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DiCO Ai</title>
    
    <!-- Méta-tags pour PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DiCO Ai">
    <meta name="theme-color" content="#0ea5e9">
    
    <!-- Icône pour l'écran d'accueil iOS (Livre bleu) -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/blue-book.png">
    
    <!-- Configuration Manifeste -->
    <link rel="manifest" href='data:application/json,{"name":"DiCO Ai","short_name":"DiCO Ai","start_url":".","display":"standalone","background_color":"#f8fafc","theme_color":"#0ea5e9","icons":[{"src":"https://img.icons8.com/fluency/512/blue-book.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>

    <!-- Librairies Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: #f8fafc; color: #0f172a; margin: 0; padding: 0; min-height: 100vh; font-weight: 200; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .font-light { font-weight: 200; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        
        /* --- ANIMATIONS DU LOGO --- */
        @keyframes logoSlideIn {
            0% { transform: translateX(80vw); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes pageTurnOnce {
            0% { transform: rotateY(0deg); opacity: 1; }
            100% { transform: rotateY(-180deg); opacity: 0; }
        }
        .animate-logo-slide { animation: logoSlideIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-page-turn { transform-origin: left center; animation: pageTurnOnce 1s 1.2s cubic-bezier(0.645, 0.045, 0.355, 1) forwards; backface-visibility: hidden; }
        .book-perspective { perspective: 1000px; position: relative; }

        /* Styles UI */
        .word-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(226, 232, 240, 0.5); }
        .btn-press:active { transform: scale(0.96); opacity: 0.8; }
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { pointer-events: auto; animation: slideDown 0.4s ease forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .loader-spin { border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .image-glow { animation: pulseGlow 2s infinite ease-in-out; }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 5px rgba(14, 165, 233, 0.2); } 50% { box-shadow: 0 0 20px rgba(14, 165, 233, 0.4); } 100% { box-shadow: 0 0 5px rgba(14, 165, 233, 0.2); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- CONFIGURATION AUTOMATIQUE ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { apiKey: "demo", projectId: "demo" };
        
        const apiKey = ""; // Gemini API Key (Laisser vide si géré par environnement)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dico-ai-alex';

        // Initialisation Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- COMPOSANT LOGO LIVRE ---
        const BookLogo = ({ size = 64, color = "white", className = "" }) => (
            <div className={`bg-sky-500 rounded-2xl flex items-center justify-center shadow-lg ${className}`} style={{ width: size, height: size }}>
                <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-3/5 h-3/5">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                </svg>
            </div>
        );

        // --- UTILITAIRE ICONES ---
        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        iconRef.current.innerHTML = icon.toSvg({ class: className, ...props });
                    }
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        // --- UTILITAIRES AUDIO ---
        const pcmToWav = (pcmBase64, sampleRate = 24000) => {
            const byteCharacters = atob(pcmBase64);
            const pcmData = new Int16Array(byteCharacters.length / 2);
            for (let i = 0; i < pcmData.length; i++) {
                pcmData[i] = (byteCharacters.charCodeAt(i * 2 + 1) << 8) | byteCharacters.charCodeAt(i * 2);
            }
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
            return new Blob([view], { type: 'audio/wav' });
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [words, setWords] = useState([]);
            const [search, setSearch] = useState('');
            const [toasts, setToasts] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [isGeneratingImg, setIsGeneratingImg] = useState(null); 
            const [expandedId, setExpandedId] = useState(null);

            const addToast = (text, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, text, type }]);
                setTimeout(() => removeToast(id), 3000);
            };

            const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

            // AUTH INITIALIZATION (Rule 3)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else if (!auth.currentUser) {
                            // On tente une connexion anonyme automatique pour le test
                            await auth.signInAnonymously();
                        }
                    } catch (e) {
                        console.error("Auth init error:", e);
                    } finally {
                        setIsAuthReady(true);
                    }
                };
                initAuth();
                const unsub = auth.onAuthStateChanged(u => setUser(u));
                return unsub;
            }, []);

            // DATA FETCHING (Rule 1 & 3)
            useEffect(() => {
                if (user) {
                    const collectionPath = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary');
                    return collectionPath.onSnapshot(snap => {
                        setWords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    }, err => {
                        console.error("Firestore Error:", err);
                        addToast("Erreur de synchronisation.", "error");
                    });
                }
            }, [user]);

            const filteredWords = useMemo(() => {
                return words
                    .filter(w => w.term.toLowerCase().includes(search.toLowerCase()))
                    .sort((a, b) => a.term.localeCompare(b.term));
            }, [words, search]);

            const fetchGemini = async (prompt, model = "gemini-2.5-flash-preview-09-2025") => {
                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        return await response.json();
                    } catch (e) {
                        if (i === 4) throw e;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const handleAddEntry = async () => {
                if (!inputValue.trim() || isLoading || !user) return;
                setIsLoading(true);
                try {
                    const prompt = `Analyse l'entrée suivante : "${inputValue}". Réponds UNIQUEMENT au format JSON : {"category": "mot" | "proverbe" | "personnage", "term": "corrigé", "definition": "sens précis", "example": "usage/fait", "details": "origine/dates"}`;
                    const data = await fetchGemini(prompt);
                    const aiResult = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));

                    const collectionPath = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary');
                    await collectionPath.add({
                        ...aiResult,
                        createdAt: Date.now()
                    });
                    setInputValue('');
                    addToast(`"${aiResult.term}" ajouté.`);
                } catch (e) { 
                    addToast("Erreur IA ou configuration.", "error"); 
                } finally { setIsLoading(false); }
            };

            const speakGemini = async (text) => {
                if (isSpeaking) return;
                setIsSpeaking(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                            }
                        })
                    });
                    const result = await response.json();
                    const base64Audio = result.candidates[0].content.parts[0].inlineData.data;
                    const audio = new Audio(URL.createObjectURL(pcmToWav(base64Audio)));
                    audio.onended = () => setIsSpeaking(false);
                    audio.play();
                } catch (e) {
                    setIsSpeaking(false);
                    addToast("Erreur synthèse vocale.", "error");
                }
            };

            const generateImage = async (word) => {
                setIsGeneratingImg(word.id);
                try {
                    const promptText = word.category === 'personnage' 
                        ? `Un portrait réaliste de ${word.term}, style historique`
                        : `Une illustration poétique du proverbe "${word.term}"`;
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instances: { prompt: promptText }, parameters: { sampleCount: 1 } })
                    });
                    const result = await response.json();
                    const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                    
                    const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary').doc(word.id);
                    await docRef.update({ imageUrl });
                    addToast("Image générée ✨");
                } catch (e) {
                    addToast("Erreur génération image.", "error");
                } finally { setIsGeneratingImg(null); }
            };

            const handleGuestAccess = async () => {
                if (isLoading) return;
                setIsLoading(true);
                try {
                    await auth.signInAnonymously();
                } catch (e) {
                    addToast("Erreur d'accès invité.", "error");
                } finally { setIsLoading(false); }
            };

            if (!isAuthReady) return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                    <div className="loader-spin border-sky-500"></div>
                </div>
            );

            if (!user) return (
                <div className="flex-1 flex flex-col items-center justify-center p-8 bg-slate-50 font-light overflow-hidden">
                    <div className="toast-container">{toasts.map(t => <Toast key={t.id} msg={t} remove={() => removeToast(t.id)} />)}</div>
                    <div className="text-center space-y-8 w-full max-w-sm">
                        <div className="mx-auto flex justify-center">
                            <BookLogo size={100} />
                        </div>
                        <div className="space-y-2">
                            <h1 className="text-5xl font-light text-sky-600 tracking-tighter">DiCO Ai</h1>
                            <p className="text-slate-400 text-sm leading-tight px-4 font-light">L'intelligence au service de votre culture.</p>
                        </div>
                        <button onClick={handleGuestAccess} className="w-full bg-sky-500 text-white p-5 rounded-3xl shadow-xl shadow-sky-100 flex items-center justify-center gap-3 btn-press font-light transition-all">
                            {isLoading ? <div className="loader-spin"></div> : <><Icon name="play" /> Accès invité (Test rapide)</>}
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="flex-1 flex flex-col bg-slate-50">
                    <div className="toast-container">{toasts.map(t => <Toast key={t.id} msg={t} remove={() => removeToast(t.id)} />)}</div>
                    
                    <header className="p-6 pt-12 bg-sky-500 rounded-b-[2.5rem] sticky top-0 z-30 shadow-lg flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <BookLogo size={36} color="white" />
                            <h1 className="text-2xl font-light text-white tracking-tight">DiCO Ai</h1>
                        </div>
                        <button onClick={() => auth.signOut()} className="text-white/70 p-2 hover:text-white transition-colors"><Icon name="log-out" /></button>
                    </header>

                    <main className="p-4 flex-1 space-y-4 pb-44">
                        <div className="relative">
                            <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-4" />
                            <input type="text" placeholder="Rechercher..." className="w-full pl-10 p-4 bg-white rounded-2xl shadow-sm border-none outline-none font-light italic focus:ring-1 focus:ring-sky-100 transition-all" value={search} onChange={e => setSearch(e.target.value)} />
                        </div>

                        <div className="space-y-4">
                            {filteredWords.map(w => (
                                <div key={w.id} className={`p-6 bg-white rounded-[2.5rem] shadow-sm word-card active:scale-[0.98] ${expandedId === w.id ? 'ring-1 ring-sky-100' : ''}`} onClick={() => setExpandedId(expandedId === w.id ? null : w.id)}>
                                    <div className="flex justify-between items-start mb-2">
                                        <span className={`text-[9px] uppercase tracking-widest px-3 py-1 rounded-full ${
                                            w.category === 'proverbe' ? 'bg-emerald-50 text-emerald-600' : 
                                            w.category === 'personnage' ? 'bg-purple-50 text-purple-600' : 
                                            'bg-sky-50 text-sky-600'
                                        }`}>{w.category}</span>
                                        <div className="flex gap-2">
                                            <button onClick={(e) => { e.stopPropagation(); speakGemini(`${w.term}. ${w.definition}`); }} className={`${isSpeaking ? 'text-amber-500 animate-pulse' : 'text-sky-300'} hover:text-sky-500 transition-colors`}>
                                                <Icon name="volume-2" />
                                            </button>
                                            <button onClick={(e) => { e.stopPropagation(); db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary').doc(w.id).delete(); }} className="text-slate-100 hover:text-red-400 transition-colors"><Icon name="trash-2" className="w-4" /></button>
                                        </div>
                                    </div>
                                    <h3 className="text-2xl font-light text-slate-800 capitalize mb-1">{w.term}</h3>
                                    <p className="text-sm opacity-60 font-light leading-relaxed mb-2">{w.definition}</p>
                                    
                                    {expandedId === w.id && (
                                        <div className="mt-4 pt-4 border-t border-slate-50 space-y-4 animate-in fade-in">
                                            {w.imageUrl ? (
                                                <img src={w.imageUrl} className="w-full aspect-square object-cover rounded-3xl shadow-lg" alt={w.term} />
                                            ) : (
                                                <button onClick={(e) => { e.stopPropagation(); generateImage(w); }} disabled={isGeneratingImg === w.id} className="w-full p-4 bg-sky-50 border border-sky-100 rounded-3xl text-sky-600 text-xs flex items-center justify-center gap-2 hover:bg-sky-100 font-light">
                                                    {isGeneratingImg === w.id ? <div className="loader-spin"></div> : <><Icon name="sparkles" className="w-4" /> Illustrer avec l'IA ✨</>}
                                                </button>
                                            )}
                                            <div className="bg-slate-50 p-4 rounded-2xl">
                                                <p className="text-xs italic opacity-80 font-light tracking-tight">"{w.example}"</p>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <p className="text-[10px] text-slate-300 uppercase tracking-tighter">
                                                    {w.category === 'personnage' ? 'Époque : ' : 'Origine : '} {w.details}
                                                </p>
                                                <button onClick={(e) => { e.stopPropagation(); speakGemini(`${w.term}. ${w.definition}. ${w.example}`); }} className="text-[10px] text-sky-400 flex items-center gap-1 font-light hover:underline">
                                                    Lire la bio complète ✨
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                            {filteredWords.length === 0 && !isLoading && (
                                <div className="text-center py-20 opacity-20 italic">
                                    <p>Votre lexique est vide.</p>
                                </div>
                            )}
                        </div>
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-slate-50 to-transparent">
                        <div className="max-w-md mx-auto bg-white rounded-[3rem] shadow-2xl p-2 flex items-center gap-2 border border-slate-100">
                            <input type="text" placeholder="Ajouter un mot, proverbe..." className="flex-1 px-6 py-4 outline-none font-light italic bg-transparent" value={inputValue} onChange={e => setInputValue(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleAddEntry()} />
                            <button onClick={handleAddEntry} className="bg-sky-500 text-white p-5 rounded-[2rem] shadow-xl min-w-[70px] flex items-center justify-center btn-press hover:bg-sky-600">
                                {isLoading ? <div className="loader-spin"></div> : <Icon name="plus" className="w-6 h-6" />}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

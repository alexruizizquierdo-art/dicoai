<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DiCO Ai</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DiCO Ai">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/blue-book.png">

    <!-- Bibliothèques Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (v9 Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        
        * { 
            font-family: 'Inter', sans-serif !important; 
            font-style: normal !important; 
            font-weight: 200; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background-color: #ffffff; 
            overflow-x: hidden; 
        }

        #root { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* --- ANIMATIONS DU DICTIONNAIRE --- */
        @keyframes slideInFromRight {
            0% { transform: translateX(100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes openCoverAction {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(-180deg); }
        }

        @keyframes pageTurnAction {
            0% { transform: rotateY(0deg); opacity: 0; }
            10% { opacity: 1; }
            50% { background: #f0f7ff; box-shadow: -15px 0 30px rgba(0,0,0,0.08); }
            100% { transform: rotateY(-175deg); opacity: 0.9; }
        }

        @keyframes fadeInInsideBook {
            0% { opacity: 0; filter: blur(4px); transform: scale(0.9); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        .anim-slide-in {
            animation: slideInFromRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .book-container {
            position: relative;
            transform-style: preserve-3d;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 90vw; 
        }

        .alex-frame-box {
            background-color: #0ea5e9;
            border-radius: 24%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.3);
            position: relative;
            transform-style: preserve-3d;
        }

        .book-model {
            position: relative;
            transform-style: preserve-3d;
            width: 48%;
            height: 64%;
        }

        .book-base-pages {
            position: absolute;
            inset: 0;
            background: #ffffff;
            border-radius: 0 3px 3px 0;
            border: 1px solid #e2e8f0;
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.02);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book-spine {
            position: absolute;
            left: -4px;
            top: -1px;
            bottom: -1px;
            width: 7px;
            background: #0a7eb8;
            border-radius: 3px 0 0 3px;
            z-index: 50;
        }

        .book-cover {
            position: absolute;
            inset: 0;
            background: #ffffff;
            border: 2.5px solid #0ea5e9;
            border-radius: 3px;
            transform-origin: left center;
            z-index: 40;
            box-shadow: 2px 0 8px rgba(0,0,0,0.08);
        }

        .anim-open-cover {
            animation: openCoverAction 1s 1.2s cubic-bezier(0.645, 0.045, 0.355, 1) forwards;
        }

        .book-turning-page {
            position: absolute;
            inset: 1px;
            background: #ffffff;
            border: 1px solid #f1f5f9;
            transform-origin: left center;
            z-index: 35;
            opacity: 0;
        }

        .anim-page-flip {
            animation: pageTurnAction 1.2s 2.2s cubic-bezier(0.455, 0.03, 0.515, 0.955) forwards;
        }

        .book-inner-title {
            color: #0ea5e9;
            font-weight: 200;
            letter-spacing: -0.05em;
            text-align: center;
            pointer-events: none;
        }

        .fade-in-inner-title {
            animation: fadeInInsideBook 2.5s cubic-bezier(0.4, 0, 0.2, 1) 2.8s forwards;
            opacity: 0;
        }

        .card-premium {
            background: white;
            border-radius: 2rem;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        select {
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- CONFIGURATION D'ALEX ---
        const firebaseConfig = { 
            apiKey: "AIzaSyDS-n8NcoNTJ21FUb_MdOaPnX75EW2KIh8",
            authDomain: "dico-ai.firebaseapp.com",
            projectId: "dico-ai",
            storageBucket: "dico-ai.firebasestorage.app",
            messagingSenderId: "1083255726513",
            appId: "1:1083255726513:web:21d2af14a9efd449b0dd90"
        };
        
        const geminiApiKey = "AIzaSyAWd2ngVsAjWevdOjOE-pByEhEifiidEi4"; 

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dico-ai-alex';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const LANGUAGES = [
            { id: 'en', name: 'Anglais', code: 'en-US' },
            { id: 'es', name: 'Espagnol', code: 'es-ES' },
            { id: 'de', name: 'Allemand', code: 'de-DE' },
            { id: 'it', name: 'Italien', code: 'it-IT' },
            { id: 'ja', name: 'Japonais', code: 'ja-JP' },
            { id: 'ar', name: 'Arabe', code: 'ar-SA' }
        ];

        const DicoLogo = ({ size = 90, animated = true }) => {
            return (
                <div className={`book-container ${animated ? 'anim-slide-in' : ''}`} style={{ width: size, height: size }}>
                    <div className="alex-frame-box w-full h-full">
                        <div className="book-model">
                            <div className="book-spine" />
                            <div className="book-base-pages">
                                <span 
                                    className={`book-inner-title ${animated ? 'fade-in-inner-title' : ''}`} 
                                    style={{ 
                                        fontSize: size * 0.14,
                                        opacity: animated ? 0 : 1 
                                    }}
                                >
                                    DiCO Ai
                                </span>
                            </div>
                            {animated && <div className="book-turning-page anim-page-flip" />}
                            <div 
                                className={`book-cover ${animated ? 'anim-open-cover' : ''}`} 
                                style={{ transform: animated ? 'rotateY(0deg)' : 'rotateY(-180deg)' }}
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const SimpleIcon = ({ name, className }) => {
            const icons = {
                plus: <path d="M12 5v14M5 12h14" />,
                search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
                logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>,
                trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>,
                globe: <><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20M2 12h20"/></>,
                volume: <><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></>
            };
            return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isReady, setIsReady] = useState(false);
            const [words, setWords] = useState([]);
            const [search, setSearch] = useState('');
            const [activeTab, setActiveTab] = useState('all');
            const [inputValue, setInputValue] = useState('');
            const [selectedLang, setSelectedLang] = useState('en');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const isCustomConfig = firebaseConfig.apiKey !== "AIzaSyDS-n8NcoNTJ21FUb_MdOaPnX75EW2KIh8";
                        
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && !isCustomConfig) {
                            try {
                                await auth.signInWithCustomToken(__initial_auth_token);
                            } catch (e) {
                                await auth.signInAnonymously();
                            }
                        }
                    } catch (e) { console.error("Auth Init Error:", e); }
                    finally { setIsReady(true); }
                };
                initAuth();
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (user) {
                    const path = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary');
                    return path.onSnapshot(snap => setWords(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                }
            }, [user]);

            const filteredData = useMemo(() => {
                let res = words.filter(w => 
                    w.term?.toLowerCase().includes(search.toLowerCase()) || 
                    (w.definition && w.definition.toLowerCase().includes(search.toLowerCase()))
                );
                if (activeTab !== 'all') res = res.filter(w => w.category === activeTab);
                return res.sort((a, b) => (a.term || "").localeCompare(b.term || ""));
            }, [words, search, activeTab]);

            const handleSpeak = (text, lang = 'fr-FR') => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = lang;
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const handleAdd = async () => {
                if (!inputValue.trim() || loading || !user) return;
                setLoading(true);
                const targetLangObj = LANGUAGES.find(l => l.id === selectedLang);
                try {
                    const prompt = `Analyse "${inputValue}". Réponds UNIQUEMENT en JSON : {
                        "category": "mot" | "proverbe" | "personnage", 
                        "term": "corrigé", 
                        "definition": "explication fine", 
                        "translation": { "lang": "${targetLangObj.name}", "text": "traduction", "code": "${targetLangObj.code}" }
                    }`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
                    
                    if (user) {
                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary').add({ ...result, createdAt: Date.now() });
                    }
                    setInputValue('');
                } catch (e) { console.error(e); } finally { setLoading(false); }
            };

            const handleGoogleSignIn = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    console.error("Google Sign-in Error:", e);
                }
            };

            const handleAnonymousSignIn = async () => {
                try {
                    await auth.signInAnonymously();
                } catch(e) { console.error(e); }
            };

            if (!isReady) return null;

            if (!user) return (
                <div className="flex-1 flex flex-col items-center justify-center p-6 bg-white text-center">
                    <div className="mb-6 flex justify-center w-full">
                        <DicoLogo size={Math.min(280, window.innerWidth * 0.7)} animated={true} />
                    </div>
                    <div className="space-y-4 mb-12">
                        {/* Suppression du doublon DiCO Ai ici car il est présent dans le logo animé */}
                        <p className="text-slate-300 text-base font-light tracking-wide">L'encyclopédie universelle épurée.</p>
                    </div>
                    
                    <div className="w-full max-w-[280px] space-y-4">
                        <button 
                            onClick={handleGoogleSignIn}
                            className="w-full bg-white text-slate-600 py-5 rounded-[2rem] shadow-sm border border-slate-100 flex items-center justify-center gap-3 active:scale-95 transition-all text-[11px] font-light tracking-widest uppercase"
                        >
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" alt="G" />
                            Se connecter avec Google
                        </button>
                        
                        <button 
                            onClick={handleAnonymousSignIn}
                            className="w-full bg-sky-500 text-white py-5 rounded-[2rem] shadow-xl shadow-sky-100 active:scale-95 transition-all text-[11px] font-light tracking-[0.4em] uppercase"
                        >
                            Mode Invité
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="flex-1 flex flex-col bg-[#fdfdfd] overflow-hidden">
                    <header className="p-6 pt-10 flex items-center justify-between z-30">
                        <div className="flex items-center gap-4">
                            <DicoLogo size={Math.min(84, window.innerWidth * 0.2)} animated={false} />
                            {user.photoURL && (
                                <img src={user.photoURL} className="w-8 h-8 rounded-full border border-white shadow-sm" alt="U" />
                            )}
                        </div>
                        <button onClick={() => { auth.signOut(); setUser(null); }} className="text-slate-300 p-2 hover:text-rose-400 transition-colors"><SimpleIcon name="logout" className="w-6 h-6" /></button>
                    </header>

                    <main className="p-6 flex-1 space-y-6 overflow-y-auto no-scrollbar pb-60">
                        <div className="bg-white rounded-[2.2rem] flex items-center px-6 py-4 border border-slate-100 shadow-sm">
                            <SimpleIcon name="search" className="text-slate-300 w-4 h-4 mr-4" />
                            <input type="text" placeholder="Rechercher..." className="w-full bg-transparent outline-none text-base font-light italic" value={search} onChange={e => setSearch(e.target.value)} />
                        </div>

                        <div className="flex items-center gap-2 overflow-x-auto no-scrollbar pb-2">
                            {['all', 'mot', 'proverbe', 'personnage'].map(tab => (
                                <button 
                                    key={tab} 
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-6 py-2 rounded-full text-[10px] uppercase tracking-widest whitespace-nowrap transition-all ${activeTab === tab ? 'bg-sky-500 text-white shadow-md' : 'bg-white text-slate-300 border border-slate-50'}`}
                                >
                                    {tab === 'all' ? 'Tous' : tab + 's'}
                                </button>
                            ))}
                        </div>

                        <div className="space-y-5">
                            {filteredData.map(w => (
                                <div key={w.id} className="p-8 card-premium animate-in fade-in slide-in-from-bottom-2">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex items-center gap-3">
                                            <span className="text-[10px] uppercase tracking-[0.2em] text-sky-400 font-light bg-sky-50 px-3 py-1 rounded-full">{w.category}</span>
                                            <button 
                                                onClick={() => handleSpeak(`${w.term}. ${w.definition}`)} 
                                                className="text-sky-200 hover:text-sky-500 transition-colors p-1"
                                            >
                                                <SimpleIcon name="volume" className="w-4 h-4" />
                                            </button>
                                        </div>
                                        <button onClick={() => {
                                            db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dictionary').doc(w.id).delete();
                                        }} className="text-slate-100 hover:text-rose-400 p-1"><SimpleIcon name="trash" className="w-4 h-4" /></button>
                                    </div>
                                    <h3 className="text-2xl font-light tracking-tight capitalize mb-2">{w.term}</h3>
                                    <p className="text-base opacity-50 leading-relaxed font-light mb-6">{w.definition}</p>
                                    {w.translation && (
                                        <div className="pt-6 border-t border-slate-50 space-y-3">
                                            <div className="flex items-center gap-2 text-slate-300">
                                                <SimpleIcon name="globe" className="w-3.5 h-3.5" />
                                                <span className="text-[9px] uppercase tracking-[0.2em] font-light">Traduction : {w.translation.lang}</span>
                                            </div>
                                            <div 
                                                className="text-lg font-light text-slate-400 italic leading-tight flex items-center gap-2 cursor-pointer hover:text-sky-500 transition-colors"
                                                onClick={() => handleSpeak(w.translation.text, w.translation.code || 'en-US')}
                                            >
                                                {w.translation.text}
                                                <SimpleIcon name="volume" className="w-3 h-3 opacity-30" />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                            {filteredData.length === 0 && (
                                <p className="text-center py-20 text-slate-200 italic font-light">Aucun résultat trouvé...</p>
                            )}
                        </div>
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-white via-white/95 to-transparent pointer-events-none">
                        <div className="max-w-md mx-auto space-y-4 pointer-events-auto">
                            <div className="flex justify-center">
                                <select className="bg-white/80 backdrop-blur-sm border border-slate-100 text-[10px] uppercase tracking-widest px-8 py-2.5 rounded-full text-slate-400 outline-none shadow-sm focus:ring-1 focus:ring-sky-200 cursor-pointer" value={selectedLang} onChange={(e) => setSelectedLang(e.target.value)}>
                                    {LANGUAGES.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
                                </select>
                            </div>
                            <div className="bg-white rounded-[3.2rem] shadow-2xl p-2.5 flex items-center gap-3 border border-slate-100">
                                <input type="text" placeholder="Ajouter au savoir..." className="flex-1 bg-transparent px-8 py-5 outline-none font-light text-base italic" value={inputValue} onChange={e => setInputValue(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleAdd()} />
                                <button onClick={handleAdd} className="bg-sky-500 text-white p-5 rounded-[2.5rem] active:scale-90 transition-all">{loading ? <div className="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin" /> : <SimpleIcon name="plus" className="w-6 h-6" />}</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICO AI - Lexique Intelligent</title>
    <!-- Librairies Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            font-weight: 200;
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }
        .font-light { font-weight: 200; }
        .tracking-tighter { letter-spacing: -0.05em; }
        .word-card { transition: all 0.3s ease; }
        .btn-active:active { transform: scale(0.95); }
        
        /* Animation de chargement */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #38bdf8;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURATION FIREBASE ---
        // Alex : Remplace ces valeurs quand tu auras tes clés. 
        // En attendant, l'app restera en "Mode Démo" pour que tu puisses la tester.
        const firebaseConfig = {
            apiKey: "VOTRE_API_KEY",
            authDomain: "VOTRE_PROJECT.firebaseapp.com",
            projectId: "VOTRE_PROJECT_ID",
            storageBucket: "VOTRE_PROJECT.appspot.com",
            messagingSenderId: "VOTRE_SENDER_ID",
            appId: "VOTRE_APP_ID"
        };

        // Initialisation Conditionnelle
        const isConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "VOTRE_API_KEY";
        let auth, db;
        
        if (isConfigured) {
            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
            } catch (e) { console.error("Firebase init error", e); }
        }

        // --- COMPOSANTS UI ---

        const DicoLogo = () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" style={{ width: '48px', height: '48px' }}>
                <path d="M2 6c0-2 2-3 4-3s4 1 6 3c2-2 4-3 6-3s4 1 4 3v12c0 2-2 3-4 3s-4-1-6-3c-2 2-4 3-6 3s-4-1-4-3V6z" />
                <path d="M12 6v12" />
                <path d="M6 8h2" opacity="0.3" />
                <path d="M16 8h2" opacity="0.3" />
            </svg>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [authMode, setAuthMode] = useState('login');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isDrivingMode, setIsDrivingMode] = useState(false);
            const [words, setWords] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            const [isDemo, setIsDemo] = useState(!isConfigured);

            // Gérer l'état de l'utilisateur
            useEffect(() => {
                if (isConfigured && auth) {
                    return auth.onAuthStateChanged(u => {
                        setUser(u);
                        setIsDemo(false);
                    });
                }
            }, []);

            // Charger les mots (Firestore ou LocalStorage pour la démo)
            useEffect(() => {
                if (isDemo) {
                    const localData = localStorage.getItem('dico_demo_words');
                    if (localData) setWords(JSON.parse(localData));
                } else if (user && db) {
                    return db.collection("users").doc(user.uid).collection("dictionary")
                        .orderBy("createdAt", "desc")
                        .onSnapshot(snap => {
                            setWords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        });
                }
            }, [user, isDemo]);

            // Sauvegarde locale pour le mode démo
            const saveLocal = (newWords) => {
                setWords(newWords);
                localStorage.setItem('dico_demo_words', JSON.stringify(newWords));
            };

            const handleGoogleAuth = async () => {
                setError(null);
                if (isDemo) {
                    setIsLoading(true);
                    setTimeout(() => {
                        setUser({ email: 'alex.demo@gmail.com', displayName: 'Alex' });
                        setIsLoading(false);
                    }, 800);
                    return;
                }
                
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await auth.signInWithPopup(provider);
                } catch (err) {
                    setError("Erreur : " + err.message);
                }
            };

            const handleEmailAuth = async (e) => {
                e.preventDefault();
                setError(null);
                if (isDemo) {
                    setUser({ email: email, displayName: email.split('@')[0] });
                    return;
                }
                setIsLoading(true);
                try {
                    if (authMode === 'login') await auth.signInWithEmailAndPassword(email, password);
                    else await auth.createUserWithEmailAndPassword(email, password);
                } catch (err) {
                    setError("Identifiants incorrects.");
                } finally { setIsLoading(false); }
            };

            const addWord = async () => {
                if (!inputValue.trim()) return;
                setIsLoading(true);
                const newWord = {
                    term: inputValue,
                    definition: "Analyse en cours...",
                    createdAt: Date.now()
                };

                if (isDemo) {
                    saveLocal([ { ...newWord, id: Date.now().toString() }, ...words ]);
                    setInputValue('');
                    setIsLoading(false);
                } else {
                    await db.collection("users").doc(user.uid).collection("dictionary").add(newWord);
                    setInputValue('');
                    setIsLoading(false);
                }
            };

            const deleteWord = async (id) => {
                if (isDemo) saveLocal(words.filter(w => w.id !== id));
                else await db.collection("users").doc(user.uid).collection("dictionary").doc(id).delete();
            };

            // --- VUE LOGIN ---
            if (!user) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 font-light">
                        {error && (
                            <div className="fixed top-6 left-6 right-6 bg-red-500 text-white p-4 rounded-2xl shadow-xl z-50 flex justify-between items-center text-xs">
                                <span>{error}</span>
                                <button onClick={() => setError(null)}><i data-lucide="x" style={{width:'14px'}}></i></button>
                            </div>
                        )}
                        
                        <div className="max-w-sm w-full space-y-10 animate-in fade-in duration-700">
                            <div className="text-center space-y-4">
                                <div className="bg-sky-500 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl text-white">
                                    <DicoLogo />
                                </div>
                                <h1 className="text-5xl font-light italic tracking-tighter text-sky-600 uppercase">DICO AI</h1>
                                <p className="text-slate-400 italic opacity-70">Votre lexique personnel intelligent.</p>
                            </div>

                            <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100 space-y-6">
                                <button 
                                    onClick={handleGoogleAuth}
                                    className="w-full flex items-center justify-center gap-3 py-4 border border-slate-100 rounded-2xl text-slate-600 hover:bg-slate-50 transition-all shadow-sm active:scale-95 btn-active"
                                >
                                    {isLoading ? <div className="loader"></div> : <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" />}
                                    <span className="font-light">Continuer avec Google</span>
                                </button>

                                <div className="relative flex items-center py-2">
                                    <div className="flex-grow border-t border-slate-50"></div>
                                    <span className="flex-shrink mx-4 text-[10px] text-slate-300 uppercase tracking-widest font-light">Ou par email</span>
                                    <div className="flex-grow border-t border-slate-50"></div>
                                </div>
                                
                                <form onSubmit={handleEmailAuth} className="space-y-4">
                                    <input type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)}
                                        className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none italic font-light border border-transparent focus:border-sky-200 transition-all" required />
                                    <input type="password" placeholder="Mot de passe" value={password} onChange={(e) => setPassword(e.target.value)}
                                        className="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none italic font-light border border-transparent focus:border-sky-200 transition-all" required />
                                    <button type="submit" className="w-full bg-sky-500 text-white py-4 rounded-2xl shadow-lg shadow-sky-100 hover:bg-sky-600 transition-all uppercase tracking-widest text-sm font-light btn-active">
                                        {authMode === 'login' ? 'Se connecter' : "Créer mon compte"}
                                    </button>
                                </form>
                            </div>

                            <div className="text-center space-y-4">
                                <p className="text-sm text-slate-400 italic">
                                    {authMode === 'login' ? "Pas encore de compte ?" : "Déjà membre ?"}
                                </p>
                                <button 
                                    onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} 
                                    className="w-full py-3 rounded-2xl border border-sky-100 text-sky-600 tracking-tight hover:bg-sky-50 transition-all font-light btn-active"
                                >
                                    {authMode === 'login' ? "Créer un compte maintenant" : "Retourner à la connexion"}
                                </button>
                            </div>
                            
                            {isDemo && (
                                <div className="p-4 bg-amber-50 rounded-2xl border border-amber-100 text-[10px] text-amber-700 text-center uppercase tracking-widest leading-relaxed">
                                    Mode Démo Actif<br/>Les données sont stockées sur ce téléphone uniquement.
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // --- VUE APP ---
            return (
                <div className={`min-h-screen pb-32 transition-all duration-700 font-light ${isDrivingMode ? 'bg-sky-950 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    <header className={`${isDrivingMode ? 'bg-sky-900/80 border-b border-sky-800' : 'bg-white shadow-sm'} p-6 rounded-b-[2.5rem] sticky top-0 z-30 backdrop-blur-md transition-colors`}>
                        <div className="max-w-md mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 p-2 rounded-2xl bg-sky-500 text-white shadow-xl flex items-center justify-center">
                                    <DicoLogo />
                                </div>
                                <h1 className="text-3xl font-light tracking-tighter italic uppercase text-sky-600 leading-none">DICO AI</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => { if(isConfigured) auth.signOut(); setUser(null); }} className="p-3 text-slate-300 hover:text-red-400 transition-colors btn-active">
                                    <i data-lucide="log-out" style={{width:'20px'}}></i>
                                </button>
                                <button onClick={() => setIsDrivingMode(!isDrivingMode)} className={`px-4 py-2 rounded-2xl text-[10px] tracking-widest uppercase transition-all btn-active ${isDrivingMode ? 'bg-orange-500 text-white shadow-lg animate-pulse' : 'bg-slate-50 text-slate-500'}`}>
                                    {isDrivingMode ? 'ON' : 'MODE AUTO'}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 space-y-6 mt-4">
                        <div className="relative">
                            <i data-lucide="search" className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 w-4"></i>
                            <input type="text" placeholder="Rechercher..." className="w-full pl-12 pr-6 py-5 bg-white rounded-[2.5rem] shadow-sm border border-slate-100 italic outline-none focus:ring-1 focus:ring-sky-200 transition-all font-light" />
                        </div>

                        <div className="space-y-4">
                            {words.map(word => (
                                <div key={word.id} className="p-6 bg-white rounded-[2rem] shadow-sm border border-slate-50 flex justify-between items-start word-card">
                                    <div className="flex-1">
                                        <h3 className="text-2xl italic tracking-tight mb-2 text-slate-800">{word.term}</h3>
                                        <p className="text-sm opacity-60 leading-relaxed">{word.definition}</p>
                                    </div>
                                    <button onClick={() => deleteWord(word.id)} className="text-slate-200 hover:text-red-400 p-2 transition-colors btn-active">
                                        <i data-lucide="trash-2" style={{width:'18px'}}></i>
                                    </button>
                                </div>
                            ))}
                        </div>
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-slate-50 to-transparent">
                        <div className="max-w-md mx-auto bg-white rounded-[3rem] shadow-2xl p-2 flex items-center gap-2 border border-slate-100">
                            <input type="text" placeholder="Nouveau mot..." className="flex-1 bg-transparent px-8 py-5 outline-none italic font-light" value={inputValue} onChange={(e) => setInputValue(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && addWord()} />
                            <button onClick={addWord} className="bg-sky-500 text-white p-5 rounded-[2rem] shadow-xl hover:bg-sky-600 active:scale-95 transition-all btn-active">
                                {isLoading ? <div className="loader"></div> : <i data-lucide="plus"></i>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
